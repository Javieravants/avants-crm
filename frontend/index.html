<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avants Suite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/styles.css">
</head>
<body>

  <!-- LOGIN -->
  <div id="login-view" class="login-wrapper hidden">
    <div class="login-box">
      <h1>Avants Suite</h1>
      <p>Inicia sesión para continuar</p>
      <div id="login-error" class="login-error"></div>
      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" class="form-control" placeholder="tu@avants.es" required>
        </div>
        <div class="form-group">
          <label for="login-password">Contraseña</label>
          <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">Entrar</button>
      </form>
    </div>
  </div>

  <!-- APP SHELL -->
  <div id="app-view" class="app-layout hidden">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">Avants Suite</div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <a class="sidebar-link active" data-module="dashboard">
          <span class="icon" id="ico-dashboard"></span> Dashboard
        </a>
        <a class="sidebar-link" data-module="personas" id="nav-personas">
          <span class="icon" id="ico-personas"></span> Clientes
        </a>
        <a class="sidebar-link" data-module="pipeline">
          <span class="icon" id="ico-pipeline"></span> Pipeline
        </a>
        <a class="sidebar-link" data-module="fichate">
          <span class="icon" id="ico-fichate"></span> Fichate
        </a>
        <a class="sidebar-link" data-module="tickets">
          <span class="icon" id="ico-tickets"></span> Tickets
          <span class="notif-badge hidden" id="badge-tickets"></span>
        </a>
        <a class="sidebar-link" data-module="llamada">
          <span class="icon" id="ico-llamada"></span> Llamada
        </a>
        <a class="sidebar-link" data-module="calculadora">
          <span class="icon" id="ico-calculadora"></span> Calculadora
        </a>
        <a class="sidebar-link" data-module="grabaciones">
          <span class="icon" id="ico-grabaciones"></span> Grabaciones
          <span class="notif-badge hidden" id="badge-grabaciones"></span>
        </a>
        <a class="sidebar-link" data-module="impagos">
          <span class="icon" id="ico-impagos"></span> Impagos
        </a>
        <a class="sidebar-link" data-module="import" id="nav-import">
          <span class="icon" id="ico-importar"></span> Importar
        </a>
        <a class="sidebar-link" data-module="settings" id="nav-settings">
          <span class="icon" id="ico-settings"></span> Settings
        </a>
        <a class="sidebar-link" data-module="assistant" id="nav-assistant">
          <span class="icon" id="ico-asistente"></span> Asistente IA
        </a>
        <a class="sidebar-link" data-module="usuarios" id="nav-usuarios">
          <span class="icon" id="ico-usuarios"></span> Usuarios
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <strong id="user-name"></strong>
          <span id="user-role"></span>
        </div>
        <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
      </div>
      <button class="sidebar-toggle" id="sidebar-toggle" title="Colapsar sidebar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
    </aside>

    <!-- Buscador global Cmd+K -->
    <div id="search-overlay" class="search-hidden">
      <div id="search-modal">
        <div id="search-input-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M16.5 16.5L21 21"/></svg>
          <input id="search-input" type="text" placeholder="Buscar contactos, deals, trámites..." autocomplete="off">
          <kbd>ESC</kbd>
        </div>
        <div id="search-results"></div>
      </div>
    </div>

    <!-- Main -->
    <main class="main-content" id="main-content">
      <!-- Topbar con buscador -->
      <div id="topbar-search" style="display:flex;align-items:center;gap:10px;padding:10px 24px;background:#fff;border-bottom:1px solid #e8edf2;margin:-32px -32px 20px;position:sticky;top:0;z-index:50;">
        <div style="display:flex;align-items:center;gap:8px;background:#f4f6f9;border:1px solid #e8edf2;border-radius:8px;padding:7px 12px;flex:1;max-width:400px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M16.5 16.5L21 21"/></svg>
          <input id="topbar-search-input" type="text" placeholder="Buscar contactos, deals, trámites..." autocomplete="off" style="border:none;outline:none;background:none;font-size:13px;font-family:inherit;color:#0f172a;width:100%;">
        </div>
        <div id="topbar-search-results" style="display:none;position:absolute;top:100%;left:24px;background:#fff;border:1px solid #e8edf2;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.12);width:400px;max-height:400px;overflow-y:auto;z-index:100;"></div>
      </div>
      <!-- Los módulos se cargan aquí dinámicamente -->
    </main>
  </div>

  <!-- CloudTalk Phone Widget — flotante global -->
  <div id="ct-phone-widget">
    <button id="ct-phone-btn" onclick="CloudTalkWidget.toggle()" title="Teléfono CloudTalk">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1z"/></svg>
    </button>
    <div id="ct-phone-panel" class="ct-panel-hidden">
      <div id="ct-phone-header">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1z"/></svg>
        <span>CloudTalk Phone</span>
        <button onclick="CloudTalkWidget.toggle()" title="Cerrar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <iframe id="ct-phone-iframe" src="about:blank" allow="microphone; camera; autoplay"></iframe>
    </div>
  </div>

  <style>
    /* Buscador global */
    #search-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:800;display:flex;align-items:flex-start;justify-content:center;padding-top:min(20vh,140px);transition:opacity .15s;}
    #search-overlay.search-hidden{opacity:0;pointer-events:none;}
    #search-modal{background:#fff;border-radius:12px;width:560px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden;}
    #search-input-wrap{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid #e8edf2;}
    #search-input{flex:1;border:none;outline:none;font-size:15px;font-family:inherit;color:#0f172a;background:none;}
    #search-input::placeholder{color:#94a3b8;}
    #search-input-wrap kbd{font-size:10px;font-weight:600;color:#94a3b8;background:#f4f6f9;border:1px solid #e8edf2;border-radius:4px;padding:2px 6px;font-family:inherit;}
    #search-results{max-height:400px;overflow-y:auto;}
    .sr-group{padding:6px 0;}
    .sr-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#94a3b8;padding:6px 16px;}
    .sr-item{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;font-size:13px;transition:background .1s;}
    .sr-item:hover{background:#f4f6f9;}
    .sr-item-name{font-weight:600;color:#0f172a;flex:1;}
    .sr-item-meta{font-size:11px;color:#94a3b8;}
    .sr-item-ico{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .sr-empty{padding:24px;text-align:center;color:#94a3b8;font-size:13px;}

    #ct-phone-widget{position:fixed;bottom:20px;right:20px;z-index:900;}
    #ct-phone-btn{
      width:52px;height:52px;border-radius:50%;border:none;
      background:#009DDD;color:#fff;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 16px rgba(0,157,221,.4);
      transition:all .2s;
    }
    #ct-phone-btn:hover{transform:scale(1.08);box-shadow:0 6px 24px rgba(0,157,221,.5);}
    #ct-phone-btn.active{animation:ct-pulse 1.5s ease infinite;}
    @keyframes ct-pulse{0%,100%{box-shadow:0 4px 16px rgba(16,185,129,.4);background:#10b981;}50%{box-shadow:0 4px 24px rgba(16,185,129,.6);background:#059669;}}
    #ct-phone-panel{
      position:absolute;bottom:62px;right:0;
      width:360px;height:600px;
      background:#fff;border-radius:12px;
      box-shadow:0 8px 32px rgba(0,0,0,.16);
      overflow:hidden;display:flex;flex-direction:column;
      transition:all .25s ease;
      transform-origin:bottom right;
    }
    #ct-phone-panel.ct-panel-hidden{
      opacity:0;transform:scale(.9);pointer-events:none;
    }
    #ct-phone-header{
      display:flex;align-items:center;gap:8px;
      padding:10px 14px;background:#f4f6f9;
      border-bottom:1px solid #e8edf2;
      font-size:13px;font-weight:600;color:#475569;
      flex-shrink:0;
    }
    #ct-phone-header button{
      margin-left:auto;background:none;border:none;
      cursor:pointer;color:#94a3b8;padding:2px;border-radius:4px;
    }
    #ct-phone-header button:hover{color:#0f172a;background:#e8edf2;}
    #ct-phone-iframe{
      flex:1;border:none;width:100%;
    }
  </style>

  <script>
  // Buscador global — Cmd+K
  const SearchGlobal = {
    isOpen: false,
    timeout: null,
    open() {
      this.isOpen = true;
      document.getElementById('search-overlay').classList.remove('search-hidden');
      document.getElementById('search-input').value = '';
      document.getElementById('search-results').innerHTML = '';
      setTimeout(() => document.getElementById('search-input').focus(), 50);
    },
    close() {
      this.isOpen = false;
      document.getElementById('search-overlay').classList.add('search-hidden');
    },
    async search(q) {
      if (!q || q.length < 2) { document.getElementById('search-results').innerHTML = ''; return; }
      try {
        const data = await API.get('/search?q=' + encodeURIComponent(q));
        const el = document.getElementById('search-results');
        let html = '';
        if (data.personas.length) {
          html += '<div class="sr-group"><div class="sr-label">Contactos</div>';
          html += data.personas.map(p => `<div class="sr-item" onclick="SearchGlobal.close();App.navigate('personas');setTimeout(()=>PersonasModule.showFicha(${p.id}),200)">
            <div class="sr-item-ico" style="background:#e6f5fc;color:#009DDD;">${_ICO.llamada(14,'#009DDD')}</div>
            <div class="sr-item-name">${p.nombre}</div>
            <div class="sr-item-meta">${p.telefono||p.email||''}</div>
          </div>`).join('');
          html += '</div>';
        }
        if (data.deals.length) {
          html += '<div class="sr-group"><div class="sr-label">Deals</div>';
          html += data.deals.map(d => `<div class="sr-item" onclick="SearchGlobal.close();App.navigate('pipeline');">
            <div class="sr-item-ico" style="background:#f0fdf4;color:#10b981;">${_ICO.cierre(14,'#10b981')}</div>
            <div class="sr-item-name">${d.persona_nombre||d.producto||'Deal'}</div>
            <div class="sr-item-meta">#${d.pipedrive_id||d.id}</div>
          </div>`).join('');
          html += '</div>';
        }
        if (data.tickets.length) {
          html += '<div class="sr-group"><div class="sr-label">Trámites</div>';
          html += data.tickets.map(t => `<div class="sr-item" onclick="SearchGlobal.close();App.navigate('tickets');">
            <div class="sr-item-ico" style="background:#fffbeb;color:#f59e0b;">${_ICO.tramites(14,'#f59e0b')}</div>
            <div class="sr-item-name">${t.tipo_nombre||'Trámite'} #${t.id}</div>
            <div class="sr-item-meta">${t.estado}</div>
          </div>`).join('');
          html += '</div>';
        }
        if (!html) html = '<div class="sr-empty">Sin resultados para "' + q + '"</div>';
        el.innerHTML = html;
      } catch(e) { console.error('Search error:', e); }
    }
  };

  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); SearchGlobal.open(); }
    if (e.key === 'Escape' && SearchGlobal.isOpen) SearchGlobal.close();
  });
  document.getElementById('search-overlay')?.addEventListener('click', (e) => {
    if (e.target.id === 'search-overlay') SearchGlobal.close();
  });
  document.getElementById('search-input')?.addEventListener('input', (e) => {
    clearTimeout(SearchGlobal.timeout);
    SearchGlobal.timeout = setTimeout(() => SearchGlobal.search(e.target.value), 300);
  });

  // Topbar search (siempre visible)
  let topbarTimeout;
  document.getElementById('topbar-search-input')?.addEventListener('input', (e) => {
    clearTimeout(topbarTimeout);
    const q = e.target.value;
    const resultsEl = document.getElementById('topbar-search-results');
    if (!q || q.length < 2) { resultsEl.style.display = 'none'; return; }
    topbarTimeout = setTimeout(async () => {
      try {
        const data = await API.get('/search?q=' + encodeURIComponent(q));
        let html = '';
        if (data.personas.length) {
          html += '<div style="padding:6px 12px;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;">Contactos</div>';
          html += data.personas.map(p => `<div class="sr-item" onclick="document.getElementById('topbar-search-results').style.display='none';document.getElementById('topbar-search-input').value='';App.navigate('personas');setTimeout(()=>PersonasModule.showFicha(${p.id}),200)" style="display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #f4f6f9;">
            <span style="font-weight:600;">${p.nombre}</span><span style="font-size:11px;color:#94a3b8;margin-left:auto;">${p.telefono||p.email||''}</span>
          </div>`).join('');
        }
        if (data.deals.length) {
          html += '<div style="padding:6px 12px;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;">Deals</div>';
          html += data.deals.map(d => `<div class="sr-item" onclick="document.getElementById('topbar-search-results').style.display='none';document.getElementById('topbar-search-input').value='';App.navigate('pipeline');" style="display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #f4f6f9;">
            <span style="font-weight:600;">${d.persona_nombre||d.producto||'Deal'}</span><span style="font-size:11px;color:#94a3b8;margin-left:auto;">#${d.pipedrive_id||d.id}</span>
          </div>`).join('');
        }
        if (!html) html = '<div style="padding:16px;text-align:center;color:#94a3b8;font-size:13px;">Sin resultados</div>';
        resultsEl.innerHTML = html;
        resultsEl.style.display = 'block';
      } catch(e) { console.error('Topbar search error:', e); }
    }, 300);
  });
  document.getElementById('topbar-search-input')?.addEventListener('blur', () => {
    setTimeout(() => { document.getElementById('topbar-search-results').style.display = 'none'; }, 200);
  });

  // CloudTalk Phone Widget — controlador global
  const CloudTalkWidget = {
    isOpen: false,
    loaded: false,

    toggle() {
      const panel = document.getElementById('ct-phone-panel');
      if (!panel) return;
      this.isOpen = !this.isOpen;
      if (this.isOpen) {
        panel.classList.remove('ct-panel-hidden');
        if (!this.loaded) {
          document.getElementById('ct-phone-iframe').src = 'https://phone.cloudtalk.io';
          this.loaded = true;
        }
      } else {
        panel.classList.add('ct-panel-hidden');
      }
    },

    // Abrir el widget con un número precargado
    dialNumber(phone) {
      if (!this.isOpen) this.toggle();
      // CloudTalk Phone acepta deep links con número
      const iframe = document.getElementById('ct-phone-iframe');
      if (iframe && this.loaded) {
        try {
          iframe.contentWindow.postMessage({ type: 'dial', phone }, '*');
        } catch(e) {}
      }
    },

    // Indicador de llamada activa
    setActive(active) {
      const btn = document.getElementById('ct-phone-btn');
      if (btn) btn.classList.toggle('active', active);
    }
  };
  </script>

  <script src="/shared/auth.js"></script>
  <script src="/shared/api.js"></script>
  <script src="/modules/tickets.js"></script>
  <script src="/modules/settings.js"></script>
  <script src="/modules/assistant.js"></script>
  <script src="/modules/import.js"></script>
  <script src="/modules/personas.js"></script>
  <script src="/modules/tarifas.js"></script>
  <script src="/modules/calculadora.js"></script>
  <script src="/modules/llamada.js"></script>
  <script src="/modules/fichate.js"></script>
  <script src="/shared/icons.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script src="/shared/pdf-propuesta.js"></script>
  <script src="/modules/pipeline.js"></script>
  <script src="/modules/dashboard.js"></script>
  <script src="/shared/app.js"></script>
</body>
</html>

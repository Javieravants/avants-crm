<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestavly</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/styles.css">
</head>
<body>

  <!-- LOGIN -->
  <div id="login-view" class="login-wrapper hidden">
    <div class="login-box">
      <h1>Gestavly</h1>
      <p>Inicia sesión para continuar</p>
      <div id="login-error" class="login-error"></div>
      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" class="form-control" placeholder="tu@avants.es" required>
        </div>
        <div class="form-group">
          <label for="login-password">Contraseña</label>
          <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">Entrar</button>
      </form>
    </div>
  </div>

  <!-- APP SHELL -->
  <div id="app-view" class="app-layout hidden">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 42" width="140" height="37"><text x="0" y="32" font-family="Georgia,'Times New Roman',serif" font-size="30" font-weight="400" fill="#009DDD">G</text><text x="21" y="32" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="26" font-weight="300" letter-spacing="-1" fill="#0D1B2A">estavly</text><rect x="0" y="37" width="160" height="2.5" rx="1.25" fill="#009DDD"/></svg></div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <a class="sidebar-link active" data-module="dashboard">
          <span class="icon" id="ico-dashboard"></span> Dashboard
        </a>
        <a class="sidebar-link" data-module="personas" id="nav-personas">
          <span class="icon" id="ico-personas"></span> Clientes
        </a>
        <a class="sidebar-link" data-module="pipeline">
          <span class="icon" id="ico-pipeline"></span> Pipeline
        </a>
        <a class="sidebar-link" data-module="fichate">
          <span class="icon" id="ico-fichate"></span> Fichate
        </a>
        <a class="sidebar-link" data-module="tickets">
          <span class="icon" id="ico-tickets"></span> Tickets
          <span class="notif-badge hidden" id="badge-tickets"></span>
        </a>
        <a class="sidebar-link" data-module="campanas" id="nav-campanas">
          <span class="icon" id="ico-campanas"></span> Campanas
        </a>
        <a class="sidebar-link" data-module="dialer" id="nav-dialer">
          <span class="icon" id="ico-dialer"></span> Llamadas
          <span class="notif-badge hidden" id="badge-dialer" style="background:#ef4444;"></span>
        </a>
        <a class="sidebar-link" data-module="calculadora">
          <span class="icon" id="ico-calculadora"></span> Calculadora
        </a>
        <a class="sidebar-link" data-module="grabaciones">
          <span class="icon" id="ico-grabaciones"></span> Grabaciones
          <span class="notif-badge hidden" id="badge-grabaciones"></span>
        </a>
        <a class="sidebar-link" data-module="informes" id="nav-informes">
          <span class="icon" id="ico-informes"></span> Informes
        </a>
        <a class="sidebar-link" data-module="impagos">
          <span class="icon" id="ico-impagos"></span> Impagos
        </a>
        <a class="sidebar-link" data-module="import" id="nav-import">
          <span class="icon" id="ico-importar"></span> Importar
        </a>
        <a class="sidebar-link" data-module="settings" id="nav-settings">
          <span class="icon" id="ico-settings"></span> Settings
        </a>
        <a class="sidebar-link" data-module="assistant" id="nav-assistant">
          <span class="icon" id="ico-asistente"></span> Asistente IA
        </a>
        <a class="sidebar-link" data-module="usuarios" id="nav-usuarios">
          <span class="icon" id="ico-usuarios"></span> Usuarios
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <strong id="user-name"></strong>
          <span id="user-role"></span>
        </div>
        <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
      </div>
      <button class="sidebar-toggle" id="sidebar-toggle" title="Colapsar sidebar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
    </aside>

    <!-- Buscador global Cmd+K -->
    <div id="search-overlay" class="search-hidden">
      <div id="search-modal">
        <div id="search-input-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M16.5 16.5L21 21"/></svg>
          <input id="search-input" type="text" placeholder="Buscar contactos, deals, trámites..." autocomplete="off">
          <kbd>ESC</kbd>
        </div>
        <div id="search-results"></div>
      </div>
    </div>

    <!-- Topbar con buscador global -->
    <div id="global-topbar" style="position:absolute;top:0;left:220px;right:0;height:48px;background:#fff;border-bottom:1px solid #e8edf2;display:flex;align-items:center;padding:0 20px;z-index:40;">
      <div style="position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;background:#ffffff;border:1.5px solid #009DDD;border-radius:8px;box-shadow:0 0 0 3px rgba(0,157,221,0.12);height:36px;padding:0 12px;width:340px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#009DDD" stroke-width="1.6" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M16.5 16.5L21 21"/></svg>
        <input id="global-search" type="text" placeholder="Buscar contactos, deals, trámites..." autocomplete="off" style="border:none;outline:none;background:none;font-size:13px;font-family:inherit;color:#0f172a;width:100%;">
        <div id="global-search-results" style="display:none;position:absolute;top:calc(100% + 4px);left:0;width:100%;background:#fff;border:1px solid #e8edf2;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.12);max-height:360px;overflow-y:auto;z-index:100;"></div>
      </div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:6px;">
        <button onclick="window.open('https://web.whatsapp.com','_blank')" title="Abrir WhatsApp" style="background:none;border:none;cursor:pointer;padding:6px;border-radius:6px;display:flex;align-items:center;" onmouseover="this.style.background='#f0fdf4'" onmouseout="this.style.background='none'">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        </button>
        <button onclick="window.open('https://mail.google.com','_blank')" title="Abrir Gmail" style="background:none;border:none;cursor:pointer;padding:6px;border-radius:6px;display:flex;align-items:center;" onmouseover="this.style.background='#e6f6fd'" onmouseout="this.style.background='none'">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#009DDD" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </button>
      </div>
    </div>

    <!-- Main -->
    <main class="main-content" id="main-content" style="margin-top:48px;">
      <!-- Los módulos se cargan aquí dinámicamente -->
    </main>
  </div>

  <!-- Gestavly Phone — marcador flotante arrastrable -->
  <div id="gv-phone" class="gv-phone-hidden gv-mini">
    <!-- MINIMIZADO -->
    <div id="gv-mini" onmousedown="GVPhone._dragStart(event)" onclick="GVPhone._dragClick(event)">
      <span id="gv-mini-pulse"></span>
      <span id="gv-mini-name">—</span>
      <span id="gv-mini-timer">0:00</span>
      <span id="gv-mini-expand">&#9650;</span>
    </div>
    <!-- EXPANDIDO -->
    <div id="gv-full">
      <div id="gv-phone-head" onmousedown="GVPhone._dragStart(event)">
        <div>
          <div id="gv-phone-name">—</div>
          <div id="gv-phone-number">—</div>
        </div>
        <div style="display:flex;gap:4px;">
          <button onclick="GVPhone.minimize()" title="Minimizar" class="gv-head-btn">&#8722;</button>
          <button id="gv-close-btn" onclick="GVPhone.hide()" title="Cerrar" class="gv-head-btn gv-hidden">&times;</button>
        </div>
      </div>
      <div id="gv-phone-body">
        <div id="gv-phone-status">Listo</div>
        <div id="gv-phone-timer" class="gv-hidden">0:00</div>
        <div id="gv-phone-manual" class="gv-hidden">
          <div id="gv-phone-manual-num"></div>
          <button id="gv-phone-copy" onclick="GVPhone.copyNumber()">Copiar</button>
          <div id="gv-phone-manual-hint">Marca manualmente en CloudTalk</div>
        </div>
      </div>
      <div id="gv-phone-actions">
        <button id="gv-phone-hangup" class="gv-hidden" onclick="GVPhone.hangup()">Colgar</button>
        <button id="gv-phone-register" class="gv-hidden" onclick="GVPhone.hangup()">Registrar</button>
      </div>
      <div id="gv-phone-ia-bar" class="gv-hidden">
        <button id="gv-phone-ia-toggle" onclick="GVPhone.toggleIA()">IA Chat</button>
      </div>
      <div id="gv-phone-ia" class="gv-hidden">
        <div id="gv-ia-msgs"></div>
        <div style="display:flex;gap:4px;padding:6px 10px 8px;">
          <input id="gv-ia-input" placeholder="Pregunta..." onkeydown="if(event.key==='Enter')GVPhone.sendIA()">
          <button onclick="GVPhone.sendIA()" class="gv-ia-send">IA</button>
        </div>
      </div>
      <div id="gv-phone-provider"></div>
    </div>
  </div>

  <style>
    /* Buscador global */
    #search-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:800;display:flex;align-items:flex-start;justify-content:center;padding-top:min(20vh,140px);transition:opacity .15s;}
    #search-overlay.search-hidden{opacity:0;pointer-events:none;}
    #search-modal{background:#fff;border-radius:12px;width:560px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden;}
    #search-input-wrap{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid #e8edf2;}
    #search-input{flex:1;border:none;outline:none;font-size:15px;font-family:inherit;color:#0f172a;background:none;}
    #search-input::placeholder{color:#94a3b8;}
    #search-input-wrap kbd{font-size:10px;font-weight:600;color:#94a3b8;background:#f4f6f9;border:1px solid #e8edf2;border-radius:4px;padding:2px 6px;font-family:inherit;}
    #search-results{max-height:400px;overflow-y:auto;}
    .sr-group{padding:6px 0;}
    .sr-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#94a3b8;padding:6px 16px;}
    .sr-item{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;font-size:13px;transition:background .1s;}
    .sr-item:hover{background:#f4f6f9;}
    .sr-item-name{font-weight:600;color:#0f172a;flex:1;}
    .sr-item-meta{font-size:11px;color:#94a3b8;}
    .sr-item-ico{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .sr-empty{padding:24px;text-align:center;color:#94a3b8;font-size:13px;}

    /* Gestavly Phone */
    #gv-phone{position:fixed;bottom:20px;right:20px;z-index:9999;font-family:inherit;transition:opacity .2s,transform .2s;transform-origin:bottom right;user-select:none;}
    #gv-phone.gv-phone-hidden{opacity:0;transform:scale(.9) translateY(10px);pointer-events:none;}
    #gv-phone.gv-mini #gv-full{display:none;}
    #gv-phone:not(.gv-mini) #gv-mini{display:none;}

    /* Minimizado */
    #gv-mini{display:flex;align-items:center;gap:8px;padding:0 14px;height:44px;width:200px;background:#0f172a;border-radius:22px;cursor:grab;box-shadow:0 4px 16px rgba(0,0,0,.3);white-space:nowrap;}
    #gv-mini:active{cursor:grabbing;}
    #gv-mini-pulse{width:7px;height:7px;border-radius:50%;background:#10b981;flex-shrink:0;animation:gv-pulse 1.2s infinite;}
    #gv-mini-name{font-size:11px;font-weight:600;color:#fff;flex:1;overflow:hidden;text-overflow:ellipsis;}
    #gv-mini-timer{font-size:11px;font-weight:700;color:#10b981;font-variant-numeric:tabular-nums;flex-shrink:0;}
    #gv-mini-expand{font-size:8px;color:#64748b;flex-shrink:0;}
    #gv-mini:hover{background:#1e293b;}

    /* Expandido */
    #gv-full{width:260px;background:#0f172a;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.4);overflow:hidden;}
    #gv-phone-head{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 12px 4px;cursor:grab;}
    #gv-phone-head:active{cursor:grabbing;}
    .gv-head-btn{background:none;border:none;color:#64748b;cursor:pointer;padding:2px 4px;font-size:16px;line-height:1;border-radius:4px;}
    .gv-head-btn:hover{color:#fff;background:rgba(255,255,255,.1);}
    #gv-phone-name{font-size:12px;font-weight:700;color:#fff;}
    #gv-phone-number{font-size:10px;color:#94a3b8;margin-top:1px;}
    #gv-phone-body{padding:4px 12px 8px;text-align:center;}
    #gv-phone-status{font-size:10px;color:#94a3b8;font-weight:500;}
    #gv-phone-status.dialing{color:#f59e0b;}
    #gv-phone-status.connected{color:#10b981;}
    #gv-phone-timer{font-size:22px;font-weight:800;color:#fff;margin-top:2px;font-variant-numeric:tabular-nums;}
    #gv-phone-actions{padding:0 12px 8px;display:flex;flex-direction:column;gap:4px;}
    #gv-phone-hangup{width:100%;height:40px;display:flex;align-items:center;justify-content:center;gap:5px;border-radius:8px;border:none;background:#ef4444;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
    #gv-phone-hangup:hover{background:#dc2626;}
    #gv-phone-register{width:100%;padding:8px;border-radius:8px;border:none;background:#009DDD;color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;}
    #gv-phone-ia-bar{padding:0 12px 6px;}
    #gv-phone-ia-toggle{width:100%;padding:6px;border-radius:6px;border:1px solid #7c3aed40;background:#1e1040;color:#7c3aed;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;}
    #gv-phone-ia-toggle:hover{background:#2d1b69;}
    #gv-phone-ia{border-top:1px solid #1e293b;}
    #gv-ia-msgs{max-height:80px;overflow-y:auto;padding:4px 10px;}
    #gv-ia-msgs .gv-ia-msg{padding:3px 7px;border-radius:6px;margin:2px 0;font-size:10px;line-height:1.4;}
    #gv-ia-msgs .gv-ia-user{background:#334155;color:#e2e8f0;margin-left:20%;}
    #gv-ia-msgs .gv-ia-bot{background:#2d1b69;color:#c4b5fd;margin-right:20%;}
    #gv-ia-input{flex:1;padding:5px 8px;border:1px solid #334155;border-radius:6px;background:#1e293b;color:#e2e8f0;font-size:10px;font-family:inherit;}
    .gv-ia-send{padding:5px 8px;border-radius:6px;border:none;background:#7c3aed;color:#fff;font-size:10px;font-weight:600;cursor:pointer;}
    #gv-phone-manual{text-align:center;padding:4px 0;}
    #gv-phone-manual-num{font-size:18px;font-weight:800;color:#fff;letter-spacing:1px;margin-bottom:4px;user-select:all;}
    #gv-phone-copy{padding:4px 12px;border-radius:6px;border:1px solid #334155;background:#1e293b;color:#94a3b8;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;}
    #gv-phone-copy:hover{background:#334155;color:#fff;}
    #gv-phone-copy.copied{background:#10b981;color:#fff;border-color:#10b981;}
    #gv-phone-manual-hint{font-size:9px;color:#64748b;margin-top:4px;}
    #gv-phone-provider{padding:3px 12px;font-size:9px;color:#475569;border-top:1px solid #1e293b;text-align:center;}
    .gv-hidden{display:none!important;}
    @keyframes gv-pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
    @keyframes ct-pulse-red{0%,100%{opacity:1;}50%{opacity:.7;}}
  </style>

  <script>
  // Buscador global — Cmd+K
  const SearchGlobal = {
    isOpen: false,
    timeout: null,
    open() {
      this.isOpen = true;
      document.getElementById('search-overlay').classList.remove('search-hidden');
      document.getElementById('search-input').value = '';
      document.getElementById('search-results').innerHTML = '';
      setTimeout(() => document.getElementById('search-input').focus(), 50);
    },
    close() {
      this.isOpen = false;
      document.getElementById('search-overlay').classList.add('search-hidden');
    },
    async search(q) {
      if (!q || q.length < 2) { document.getElementById('search-results').innerHTML = ''; return; }
      try {
        const data = await API.get('/search?q=' + encodeURIComponent(q));
        const el = document.getElementById('search-results');
        let html = '';
        if (data.personas.length) {
          html += '<div class="sr-group"><div class="sr-label">Contactos</div>';
          html += data.personas.map(p => `<div class="sr-item" onclick="SearchGlobal.close();App.navigate('personas');setTimeout(()=>PersonasModule.showFicha(${p.id}),200)">
            <div class="sr-item-ico" style="background:#e6f5fc;color:#009DDD;">${_ICO.llamada(14,'#009DDD')}</div>
            <div class="sr-item-name">${p.nombre}</div>
            <div class="sr-item-meta">${p.telefono||p.email||''}</div>
          </div>`).join('');
          html += '</div>';
        }
        if (data.deals.length) {
          html += '<div class="sr-group"><div class="sr-label">Deals</div>';
          html += data.deals.map(d => `<div class="sr-item" onclick="SearchGlobal.close();App.navigate('pipeline');">
            <div class="sr-item-ico" style="background:#f0fdf4;color:#10b981;">${_ICO.cierre(14,'#10b981')}</div>
            <div class="sr-item-name">${d.persona_nombre||d.producto||'Deal'}</div>
            <div class="sr-item-meta">#${d.pipedrive_id||d.id}</div>
          </div>`).join('');
          html += '</div>';
        }
        if (data.tickets.length) {
          html += '<div class="sr-group"><div class="sr-label">Trámites</div>';
          html += data.tickets.map(t => `<div class="sr-item" onclick="SearchGlobal.close();App.navigate('tickets');">
            <div class="sr-item-ico" style="background:#fffbeb;color:#f59e0b;">${_ICO.tramites(14,'#f59e0b')}</div>
            <div class="sr-item-name">${t.tipo_nombre||'Trámite'} #${t.id}</div>
            <div class="sr-item-meta">${t.estado}</div>
          </div>`).join('');
          html += '</div>';
        }
        if (!html) html = '<div class="sr-empty">Sin resultados para "' + q + '"</div>';
        el.innerHTML = html;
      } catch(e) { console.error('Search error:', e); }
    }
  };

  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); SearchGlobal.open(); }
    if (e.key === 'Escape' && SearchGlobal.isOpen) SearchGlobal.close();
  });
  document.getElementById('search-overlay')?.addEventListener('click', (e) => {
    if (e.target.id === 'search-overlay') SearchGlobal.close();
  });
  document.getElementById('search-input')?.addEventListener('input', (e) => {
    clearTimeout(SearchGlobal.timeout);
    SearchGlobal.timeout = setTimeout(() => SearchGlobal.search(e.target.value), 300);
  });

  // Global topbar search
  let _gsTimeout;
  document.getElementById('global-search')?.addEventListener('input', (e) => {
    clearTimeout(_gsTimeout);
    const q = e.target.value;
    const res = document.getElementById('global-search-results');
    if (!q || q.length < 3) { res.style.display = 'none'; return; }
    _gsTimeout = setTimeout(async () => {
      try {
        const data = await API.get('/search?q=' + encodeURIComponent(q));
        let html = '';
        if (data.personas?.length) {
          html += '<div style="padding:4px 12px;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;">Contactos</div>';
          html += data.personas.map(p => `<div style="padding:8px 12px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #f4f6f9;" onmousedown="document.getElementById('global-search-results').style.display='none';document.getElementById('global-search').value='';App.navigate('personas');setTimeout(()=>PersonasModule.showFicha(${p.id}),200)"><strong style="flex:1;">${p.nombre||''}</strong><span style="font-size:11px;color:#94a3b8;">${p.telefono||p.email||''}</span></div>`).join('');
        }
        if (data.deals?.length) {
          html += '<div style="padding:4px 12px;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;">Deals</div>';
          html += data.deals.map(d => `<div style="padding:8px 12px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #f4f6f9;" onmousedown="document.getElementById('global-search-results').style.display='none';document.getElementById('global-search').value='';App.navigate('pipeline');"><strong style="flex:1;">${d.persona_nombre||d.producto||'Deal'}</strong><span style="font-size:11px;color:#94a3b8;">#${d.pipedrive_id||d.id}</span></div>`).join('');
        }
        if (!html) html = '<div style="padding:16px;text-align:center;color:#94a3b8;font-size:13px;">Sin resultados</div>';
        res.innerHTML = html;
        res.style.display = 'block';
      } catch(e) {}
    }, 300);
  });
  document.getElementById('global-search')?.addEventListener('blur', () => {
    setTimeout(() => { document.getElementById('global-search-results').style.display = 'none'; }, 200);
  });

  // Gestavly Phone — marcador flotante propio (CTI-agnostico)
  const GVPhone = {
    state: 'idle', // idle | dialing | connected | ended
    callId: null,
    timerInterval: null,
    callStart: null,
    pollInterval: null,
    currentPersonaId: null,

    // Iniciar llamada — punto de entrada unico para todo el CRM
    async call(phoneNumber, personaId, personaNombre) {
      this.currentPersonaId = personaId;
      this.show();
      this.setState('dialing');
      document.getElementById('gv-phone-name').textContent = personaNombre || 'Contacto';
      document.getElementById('gv-phone-number').textContent = phoneNumber;
      document.getElementById('gv-mini-name').textContent = personaNombre || 'Contacto';

      try {
        const result = await API.post('/cti/llamar', { phoneNumber, personaId });
        this.callId = result.callId || null;
        console.log('[GVPhone] CTI result:', result);
        const providerText = result.manual
          ? 'Manual' + (result.reason ? ' — ' + result.reason : '')
          : (result.agent?.name || 'Conectado');
        document.getElementById('gv-phone-provider').textContent = providerText;

        if (result.manual) {
          this.setState('manual');
        } else {
          // Llamada automatica — esperar conexion
          setTimeout(() => {
            if (this.state === 'dialing') {
              this.setState('connected');
              this._startTimer();
            }
          }, 3000);
        }

        // Polling para detectar fin de llamada via webhook
        if (personaId) this._startPoll(personaId);
      } catch (e) {
        document.getElementById('gv-phone-status').textContent = 'Error: ' + e.message;
      }
    },

    hangup() {
      if (this.callId) {
        API.post('/cti/colgar', { callId: this.callId }).catch(() => {});
      }
      this.setState('ended');
      this._stopTimer();
      this._stopPoll();
      setTimeout(() => this.hide(), 2000);
    },

    _iaHistory: [],
    _iaOpen: false,

    toggleIA() {
      this._iaOpen = !this._iaOpen;
      const el = document.getElementById('gv-phone-ia');
      if (el) el.classList.toggle('gv-hidden', !this._iaOpen);
    },

    async sendIA() {
      const input = document.getElementById('gv-ia-input');
      const msgs = document.getElementById('gv-ia-msgs');
      if (!input || !msgs) return;
      const msg = input.value.trim();
      if (!msg) return;

      msgs.innerHTML += `<div class="gv-ia-msg gv-ia-user">${msg}</div>`;
      input.value = '';
      msgs.scrollTop = msgs.scrollHeight;

      try {
        const r = await API.post('/ia/chat-llamada', {
          personaId: this.currentPersonaId,
          mensaje: msg,
          historial: this._iaHistory,
        });
        msgs.innerHTML += `<div class="gv-ia-msg gv-ia-bot">${r.respuesta}</div>`;
        msgs.scrollTop = msgs.scrollHeight;
        this._iaHistory.push({ role: 'user', content: msg });
        this._iaHistory.push({ role: 'assistant', content: r.respuesta });
        if (this._iaHistory.length > 10) this._iaHistory = this._iaHistory.slice(-10);
      } catch (e) {
        msgs.innerHTML += `<div class="gv-ia-msg gv-ia-bot" style="color:#ef4444;">${e.message || 'Error'}</div>`;
      }
    },

    setState(s) {
      this.state = s;
      const el = document.getElementById('gv-phone-status');
      const timer = document.getElementById('gv-phone-timer');
      const hangup = document.getElementById('gv-phone-hangup');
      const manual = document.getElementById('gv-phone-manual');
      const register = document.getElementById('gv-phone-register');
      const iaToggle = document.getElementById('gv-phone-ia-toggle');
      const iaPanel = document.getElementById('gv-phone-ia');
      if (!el) return;

      el.className = '';
      timer.classList.add('gv-hidden');
      hangup.classList.add('gv-hidden');
      manual.classList.add('gv-hidden');
      register.classList.add('gv-hidden');
      const iaBar = document.getElementById('gv-phone-ia-bar');
      const iaPanel = document.getElementById('gv-phone-ia');
      const closeBtn = document.getElementById('gv-close-btn');
      iaBar?.classList.add('gv-hidden');
      iaPanel?.classList.add('gv-hidden');
      closeBtn?.classList.add('gv-hidden');
      this._iaOpen = false;
      this._iaHistory = [];

      const miniPulse = document.getElementById('gv-mini-pulse');
      if (miniPulse) miniPulse.style.background = (s === 'dialing') ? '#f59e0b' : '#10b981';

      if (s === 'dialing') {
        el.textContent = 'Marcando...';
        el.classList.add('dialing');
        el.style.animation = 'gv-pulse 1.2s infinite';
      } else if (s === 'connected') {
        el.textContent = 'En llamada';
        el.classList.add('connected');
        el.style.animation = '';
        timer.classList.remove('gv-hidden');
        hangup.classList.remove('gv-hidden');
        iaBar?.classList.remove('gv-hidden');
      } else if (s === 'manual') {
        el.textContent = '';
        el.style.animation = '';
        manual.classList.remove('gv-hidden');
        register.classList.remove('gv-hidden');
        hangup.classList.remove('gv-hidden');
        iaBar?.classList.remove('gv-hidden');
        closeBtn?.classList.remove('gv-hidden');
        document.getElementById('gv-phone-manual-num').textContent =
          document.getElementById('gv-phone-number').textContent;
        this._startTimer();
      } else if (s === 'ended') {
        el.textContent = 'Llamada finalizada';
        el.style.animation = '';
        closeBtn?.classList.remove('gv-hidden');
      } else {
        el.textContent = 'Listo';
        el.style.animation = '';
      }
    },

    copyNumber() {
      const num = document.getElementById('gv-phone-manual-num')?.textContent || '';
      navigator.clipboard.writeText(num).then(() => {
        const btn = document.getElementById('gv-phone-copy');
        btn.textContent = 'Copiado';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copiar numero'; btn.classList.remove('copied'); }, 2000);
      });
    },

    show() {
      const el = document.getElementById('gv-phone');
      if (!el) return;
      el.classList.remove('gv-phone-hidden');
      el.classList.add('gv-mini');
      // Restore saved position
      const pos = JSON.parse(localStorage.getItem('gv-pos') || 'null');
      if (pos) { el.style.bottom = pos.bottom; el.style.right = pos.right; el.style.left = ''; el.style.top = ''; }
    },
    hide() {
      const el = document.getElementById('gv-phone');
      if (el) { el.classList.add('gv-phone-hidden'); el.classList.add('gv-mini'); }
      this.state = 'idle';
      this._stopTimer();
      this._stopPoll();
    },
    expand() { document.getElementById('gv-phone')?.classList.remove('gv-mini'); },
    minimize() { document.getElementById('gv-phone')?.classList.add('gv-mini'); },

    // Drag
    _dragging: false,
    _dragOff: { x: 0, y: 0 },
    _dragMoved: false,
    _dragStart(e) {
      if (e.button !== 0) return;
      this._dragging = true;
      this._dragMoved = false;
      const el = document.getElementById('gv-phone');
      const rect = el.getBoundingClientRect();
      this._dragOff = { x: e.clientX - rect.left, y: e.clientY - rect.top };
      const onMove = (ev) => {
        if (!this._dragging) return;
        this._dragMoved = true;
        el.style.left = (ev.clientX - this._dragOff.x) + 'px';
        el.style.top = (ev.clientY - this._dragOff.y) + 'px';
        el.style.right = 'auto';
        el.style.bottom = 'auto';
      };
      const onUp = () => {
        this._dragging = false;
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        // Save as bottom/right for next time
        const r = el.getBoundingClientRect();
        const bottom = (window.innerHeight - r.bottom) + 'px';
        const right = (window.innerWidth - r.right) + 'px';
        el.style.left = ''; el.style.top = '';
        el.style.bottom = bottom; el.style.right = right;
        localStorage.setItem('gv-pos', JSON.stringify({ bottom, right }));
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    },
    _dragClick(e) {
      // Only expand if not dragged
      if (!this._dragMoved) this.expand();
    },

    _startTimer() {
      this.callStart = Date.now();
      this._stopTimer();
      this.timerInterval = setInterval(() => {
        const secs = Math.floor((Date.now() - this.callStart) / 1000);
        const m = Math.floor(secs / 60);
        const s = secs % 60;
        const t = m + ':' + String(s).padStart(2, '0');
        const el = document.getElementById('gv-phone-timer');
        if (el) el.textContent = t;
        const mini = document.getElementById('gv-mini-timer');
        if (mini) mini.textContent = t;
      }, 1000);
    },
    _stopTimer() {
      if (this.timerInterval) { clearInterval(this.timerInterval); this.timerInterval = null; }
    },

    _startPoll(personaId) {
      this._stopPoll();
      const start = new Date().toISOString();
      this.pollInterval = setInterval(async () => {
        try {
          const r = await API.get(`/history/${personaId}?tipo=llamada&limit=1`);
          const last = (r.data || [])[0];
          if (last && new Date(last.created_at) > new Date(start) && last.origen === 'cloudtalk') {
            this._stopPoll();
            this.setState('ended');
            this._stopTimer();
            setTimeout(() => this.hide(), 2000);
          }
        } catch {}
      }, 3000);
    },
    _stopPoll() {
      if (this.pollInterval) { clearInterval(this.pollInterval); this.pollInterval = null; }
    },
  };

  // Retrocompatibilidad: CloudTalkWidget redirige a GVPhone
  const CloudTalkWidget = {
    toggle() { /* no-op — widget eliminado */ },
    dialNumber(phone) { GVPhone.call(phone, null, ''); },
    setActive() {},
  };

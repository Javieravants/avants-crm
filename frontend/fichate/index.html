<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<title>Fichate - Control Horario</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fafafa;--card:#fff;--sb:#fff;--sbBd:#f0f0f0;
  --ac:#009DDD;--acH:#0088c2;--acL:#e6f5fc;
  --gn:#22c55e;--gnL:#f0fdf4;--rd:#ef4444;--rdL:#fef2f2;
  --am:#f59e0b;--amL:#fffbeb;--pu:#8b5cf6;--puL:#f5f3ff;
  --tx:#1a1a2e;--t2:#6b7280;--tM:#9ca3af;--bd:#e5e7eb;
  --F:'Inter',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0}html{height:100%}
body{height:100%;font-family:var(--F);background:var(--bg);color:var(--tx);overflow:hidden}
#app{display:flex;height:100vh;width:100vw;overflow:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px}
::selection{background:rgba(255,74,110,.12)}
input,select,textarea,button{font-family:var(--F)}
a{color:var(--ac);text-decoration:none}

.sb{width:260px;height:100vh;background:var(--sb);border-right:1px solid var(--sbBd);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sb-l{padding:24px 22px;display:flex;align-items:center;gap:12px}
.sb-li{width:38px;height:38px;border-radius:10px;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff}
.sb-lt{color:var(--tx);font-weight:800;font-size:18px;letter-spacing:-.3px}
.sb-ls{color:var(--tM);font-size:11px;font-weight:500;margin-top:-1px}
.sb-section{padding:6px 16px;margin-top:10px;font-size:11px;font-weight:600;color:var(--tM);text-transform:uppercase;letter-spacing:.8px}
.sb-n{flex:1;padding:8px 12px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nb{display:flex;align-items:center;gap:12px;padding:10px 14px;border:none;border-radius:10px;cursor:pointer;font-size:14.5px;font-weight:500;font-family:var(--F);text-align:left;background:transparent;color:var(--t2);transition:all .15s}
.nb:hover{background:#f5f5f5;color:var(--tx)}
.nb.a{background:var(--acL);color:var(--ac);font-weight:600}
.nb svg{width:20px;height:20px;flex-shrink:0;opacity:.45}.nb.a svg{opacity:1}
.nb-b{margin-left:auto;background:var(--ac);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;min-width:18px;text-align:center}
.sb-u{padding:18px;border-top:1px solid var(--sbBd);display:flex;align-items:center;gap:12px}

.av{border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;flex-shrink:0}
.mn{flex:1;display:flex;flex-direction:column;overflow:hidden;height:100vh;background:var(--bg)}
.tp{height:64px;background:#fff;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 32px;flex-shrink:0}
.tp h1{font-size:22px;font-weight:800;letter-spacing:-.3px}
.ct{flex:1;overflow:auto;padding:28px 32px}

.cd{background:#fff;border-radius:16px;border:1px solid var(--bd)}
.cd-p{padding:24px}
.cd-h{padding:18px 24px;border-bottom:1px solid #f3f4f6;display:flex;justify-content:space-between;align-items:center}
.cd-h span{font-weight:700;font-size:16px}

.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.st{padding:24px}.st-l{font-size:12px;font-weight:600;color:var(--tM);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.st-v{font-size:32px;font-weight:900;letter-spacing:-1px}.st-s{font-size:13px;color:var(--tM);margin-top:6px;font-weight:500}

.bg{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:12.5px;font-weight:600}
.bg-d{width:7px;height:7px;border-radius:50%;flex-shrink:0}

.btn{padding:10px 18px;border-radius:10px;border:none;cursor:pointer;font-weight:600;font-size:14px;font-family:var(--F);display:inline-flex;align-items:center;gap:6px;transition:all .12s}
.btn:hover{opacity:.9}.bp{background:var(--ac);color:#fff}.bg2{background:var(--gn);color:#fff}.br{background:var(--rd);color:#fff}
.bo{border:1px solid var(--bd);background:#fff;color:var(--t2)}.bs{padding:6px 12px;font-size:12.5px;border-radius:8px}

.inp{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--bd);outline:none;background:#fff;color:var(--tx);font-size:14px}
.inp:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(255,74,110,.08)}
.fg{margin-bottom:12px}.fg label{display:block;font-size:12px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}

table{width:100%;border-collapse:collapse}thead tr{background:#fafafa}
th{padding:14px 20px;text-align:left;font-size:12px;font-weight:700;color:var(--tM);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--bd)}
td{padding:16px 20px;font-size:14.5px}tbody tr{border-bottom:1px solid #f5f5f5;transition:background .1s}tbody tr:hover{background:#fafafa}

.mo{position:fixed;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.mo-c{background:#fff;border-radius:18px;width:94%;max-width:540px;max-height:88vh;overflow:auto;box-shadow:0 24px 64px rgba(0,0,0,.12)}
.mo-h{padding:20px 24px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1;border-radius:18px 18px 0 0}
.mo-h h3{font-size:18px;font-weight:800}
.mo-x{background:none;border:none;font-size:20px;cursor:pointer;color:var(--tM);padding:6px;border-radius:8px}
.mo-x:hover{background:#f5f5f5}.mo-b{padding:24px}

.g2{display:grid;grid-template-columns:1.15fr 1fr;gap:20px}
.empty{padding:40px;text-align:center;color:var(--tM);font-size:15px}
.vb{width:60px;height:6px;border-radius:3px;background:#f3f4f6;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:8px}
.vb-f{height:100%;border-radius:3px}
.tg{padding:14px 18px;border-radius:10px;font-size:14px;line-height:1.6}
.drop{text-align:center;padding:40px;border:2px dashed rgba(255,74,110,.25);border-radius:16px;background:rgba(255,240,243,.3)}
.login-bg{min-height:100vh;width:100vw;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(26,26,46,.85),rgba(15,52,96,.85)),url('https://images.unsplash.com/photo-1521737711867-e3b97375f902?w=1920&q=80') center/cover no-repeat;position:relative}
.login-card{width:100%;max-width:400px;padding:36px 32px;background:rgba(255,255,255,.06);backdrop-filter:blur(20px);border-radius:24px;border:1px solid rgba(255,255,255,.1);box-shadow:0 32px 64px rgba(0,0,0,.3)}
footer{text-align:center;padding:14px 0;font-size:11px;color:var(--tM);border-top:1px solid #f3f4f6}

@media(max-width:768px){.sb{width:68px}.sb-lt,.sb-ls,.nb>span:not(.nb-b),.sb-u>div,.sb-section{display:none}.sb-l{padding:18px 14px;justify-content:center}.sg{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}.tp{padding:0 16px}.tp h1{font-size:18px}.ct{padding:16px}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const API='https://segurosdesaludonline.com/calculadora/fichate/api.php';
const AT={vacation:{l:'Vacaciones',c:'#6366f1'},medical_full:{l:'Baja Médica',c:'#ef4444'},medical_hours:{l:'Visita Médica',c:'#f59e0b',p:1},personal:{l:'Asunto Personal',c:'#8b5cf6'},maternity:{l:'Maternidad/Pat.',c:'#14b8a6'},training:{l:'Formación',c:'#3b82f6'},other:{l:'Otro',c:'#64748b'}};
const SM={pending:{l:'Pendiente',c:'#f59e0b',b:'#fffbeb'},approved:{l:'Aprobada',c:'#22c55e',b:'#f0fdf4'},rejected:{l:'Rechazada',c:'#ef4444',b:'#fef2f2'}};
const RR=["Coincidencia con otros permisos","Necesidades del servicio","Documentación incompleta","Campaña comercial","Límite de ausencias","Otro motivo"];

let S={token:localStorage.getItem('ft2_t'),user:JSON.parse(localStorage.getItem('ft2_u')||'null'),view:'dashboard',emps:[],recs:[],reqs:[],docs:[],hols:[],dash:null,appCreds:[],selEmp:null};

function clr(){localStorage.removeItem('ft2_t');localStorage.removeItem('ft2_u');S.token=null;S.user=null;S.selEmp=null;render()}

async function api(a,o={}){
  const{method='GET',body,params={},isForm=false}=o;
  let u=`${API}?action=${a}`;if(S.token)u+=`&token=${encodeURIComponent(S.token)}`;
  Object.entries(params).forEach(([k,v])=>u+=`&${k}=${encodeURIComponent(v)}`);
  const h={};if(!isForm)h['Content-Type']='application/json';
  const f={method,headers:h};if(body)f.body=isForm?body:JSON.stringify(body);
  const r=await fetch(u,f);
  if(a==='report_csv'||a==='document_download')return r;
  const d=await r.json();
  if(r.status===401&&a!=='login'){clr();throw new Error('Sesión expirada')}
  if(!r.ok)throw new Error(d.error||'Error');return d;
}

function isA(){return S.user&&(S.user.role==='admin'||S.user.role==='supervisor')}
function fD(d){return d?new Date(d+'T12:00:00').toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'}):'—'}
function fT(d){return d?new Date(d).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'}):'—'}
function dH(a,b){return a&&b?((new Date(b)-new Date(a))/36e5):0}
function hu(id){return(id*47)%360}
function ini(n){return n.split(' ').map(w=>w[0]).slice(0,2).join('')}
function av(n,id,s=36,fs=13){return`<div class="av" style="width:${s}px;height:${s}px;font-size:${fs}px;background:linear-gradient(135deg,hsl(${hu(id)},55%,60%),hsl(${hu(id)+30},50%,50%))">${ini(n)}</div>`}
function bg(l,c,b){return`<span class="bg" style="color:${c};background:${b||c+'15'}"><span class="bg-d" style="background:${c}"></span>${l}</span>`}
function rBg(r){return r==='admin'?bg('Admin','#8b5cf6','#f5f3ff'):r==='supervisor'?bg('Supervisor','#6366f1','#eef2ff'):bg('Agente','#64748b','#f1f5f9')}
function sBg(a){return a==1?bg('Activo','#22c55e','#f0fdf4'):bg('Inactivo','#ef4444','#fef2f2')}
function svg(d){return`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${d}</svg>`}

async function loadAll(){try{const[e,h,sh]=await Promise.all([api('employees'),api('holidays',{params:{year:new Date().getFullYear()}}),api('shifts')]);S.emps=e.employees||[];S.hols=h.holidays||[];S.shifts=sh.shifts||[];if(isA()){S.dash=await api('dashboard')}render()}catch(e){console.error(e)}}
async function loadRecs(m){try{S.recs=(await api('records',{params:{month:m}})).records||[];render()}catch(e){console.error(e)}}
async function loadReqs(st){try{const p=st&&st!=='all'?{status:st}:{};S.reqs=(await api('requests',{params:p})).requests||[];render()}catch(e){console.error(e)}}
async function loadDocs(){try{S.docs=(await api('documents')).documents||[];render()}catch(e){console.error(e)}}
async function loadCreds(){try{S.appCreds=(await api('app_credentials')).credentials||[];render()}catch(e){console.error(e)}}

// Nav items split into personal + company sections
const NP=[ // Personal
  {id:'clock',l:'Fichaje',i:'<circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/>'},
  {id:'requests',l:'Ausencias',i:'<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>'},
  {id:'documents',l:'Documentos',i:'<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/>'},
  {id:'credentials',l:'Credenciales',i:'<path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.778-7.778zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>'},
];
const NC=[ // Company (admin only)
  {id:'dashboard',l:'Panel',i:'<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/>'},
  {id:'employees',l:'Empleados',i:'<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>'},
  {id:'records',l:'Registros',i:'<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>'},
  {id:'payroll',l:'Nóminas',i:'<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>'},
  {id:'reports',l:'Informes',i:'<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>'},
  {id:'settings',l:'Ajustes',i:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>'},
];

function nbtn(n){const pc=S.reqs.filter(r=>r.status==='pending').length;return`<button class="nb ${S.view===n.id?'a':''}" onclick="go('${n.id}')">${svg(n.i)}<span>${n.l}</span>${n.id==='requests'&&pc>0?`<span class="nb-b">${pc}</span>`:''}</button>`}

function go(v){S.view=v;S.selEmp=null;render();
  if(v==='records')loadRecs(new Date().toISOString().slice(0,7));
  if(v==='requests')loadReqs();if(v==='documents')loadDocs();
  if(v==='dashboard'&&isA())loadAll();if(v==='employees')loadAll();
  if(v==='credentials')loadCreds();if(v==='clock')setTimeout(loadClk,100);
  if(v==='payroll')loadDocs();
}

function render(){
  const a=document.getElementById('app');
  if(!S.token||!S.user){a.innerHTML=loginH();return}
  const adm=isA();
  const allNav=[...NP,...(adm?NC:[])];
  const title=S.selEmp?'Perfil de Empleado':(allNav.find(n=>n.id===S.view)?.l||'Panel');

  a.innerHTML=`<aside class="sb">
    <div class="sb-l"><div class="sb-li">F</div><div><div class="sb-lt">Fichate</div><div class="sb-ls">Control Horario</div></div></div>
    <nav class="sb-n">
      <div class="sb-section">Tú</div>
      ${NP.map(nbtn).join('')}
      ${adm?`<div class="sb-section" style="margin-top:16px">Tu Empresa</div>${NC.map(nbtn).join('')}`:''}
    </nav>
    <div class="sb-u">${av(S.user.name,S.user.id,38,13)}<div><div style="font-size:14px;font-weight:600;color:var(--tx)">${S.user.name.split(' ').slice(0,2).join(' ')}</div><div style="font-size:11.5px;color:var(--tM)">${S.user.role==='admin'?'Administrador':S.user.role==='supervisor'?'Supervisor':'Agente'}</div></div></div>
  </aside>
  <div class="mn">
    <header class="tp">
      <div style="display:flex;align-items:center;gap:12px">
        <h1>${title}</h1>
        ${S.selEmp?`<button class="btn bo bs" onclick="S.selEmp=null;render()">← Volver</button>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div style="padding:6px 14px;border-radius:8px;background:#f0fdf4;color:#22c55e;font-size:13px;font-weight:600;display:flex;align-items:center;gap:5px"><span style="width:6px;height:6px;border-radius:50%;background:#22c55e"></span>${new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'short'})}</div>
        <button class="btn bo bs" onclick="clr()">Cerrar sesión</button>
      </div>
    </header>
    <main class="ct">${S.selEmp?profH():viewH()}</main>
    <footer>Avants SL · RD-Ley 8/2019 · Fichate v2.0</footer>
  </div>`;
}

function viewH(){switch(S.view){case'dashboard':return dashH();case'clock':return clkH();case'employees':return empH();case'records':return recH();case'requests':return reqH();case'documents':return docH();case'payroll':return payH();case'credentials':return credH();case'reports':return repH();case'settings':return setH();default:return'<div class="empty">En desarrollo</div>'}}

function loginH(){
  return`<div class="login-bg"><div class="login-card"><div style="text-align:center;margin-bottom:32px"><div style="width:56px;height:56px;border-radius:16px;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff;margin:0 auto 16px;box-shadow:0 8px 24px rgba(255,74,110,.4)">F</div><h1 style="color:#fff;font-size:26px;font-weight:900;margin:0 0 6px;letter-spacing:-.5px">FICHATE</h1><p style="color:rgba(255,255,255,.4);font-size:13px;margin:0">Control Horario · Avants SL</p></div><div class="fg"><label style="color:rgba(255,255,255,.5);font-size:11px">EMAIL</label><input class="inp" id="le" type="email" placeholder="tu@email.com" style="background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12);color:#fff;font-size:15px;padding:13px 16px;border-radius:12px" autocomplete="email"></div><div class="fg"><label style="color:rgba(255,255,255,.5);font-size:11px">CONTRASEÑA</label><input class="inp" id="lp" type="password" placeholder="••••••••" style="background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12);color:#fff;font-size:15px;padding:13px 16px;border-radius:12px" onkeydown="if(event.key==='Enter')doLogin()" autocomplete="current-password"></div><button class="btn bp" style="width:100%;justify-content:center;padding:14px;margin-top:12px;font-size:15px;border-radius:12px;box-shadow:0 4px 16px rgba(255,74,110,.3)" onclick="doLogin()">Entrar</button><div id="lerr" style="margin-top:12px"></div><div style="text-align:center;margin-top:24px;padding-top:20px;border-top:1px solid rgba(255,255,255,.06)"><p style="color:rgba(255,255,255,.25);font-size:11px;margin:0">🔒 Conexión segura · © ${new Date().getFullYear()} Avants SL</p></div></div></div>`;
}
async function doLogin(){const e=document.getElementById('le').value,p=document.getElementById('lp').value;try{const r=await fetch(`${API}?action=login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:e,password:p})});const d=await r.json();if(!r.ok)throw new Error(d.error||'Error');localStorage.setItem('ft2_t',d.token);localStorage.setItem('ft2_u',JSON.stringify(d.user));S.token=d.token;S.user=d.user;S.view=isA()?'dashboard':'clock';render();loadAll()}catch(e){document.getElementById('lerr').innerHTML=`<div style="padding:10px 14px;border-radius:8px;background:rgba(239,68,68,.12);color:#fca5a5;font-size:13px;font-weight:600">${e.message}</div>`}}
// ── Dashboard ──
function dashH(){const d=S.dash;if(!d)return'<div class="empty">Cargando panel...</div>';
  const activos=S.emps.filter(e=>e.is_active==1);
  const pctFichado=d.active_employees>0?Math.round((d.clocked_in/d.active_employees)*100):0;
  const avgH=d.clocked_in>0?(d.today_hours/d.clocked_in).toFixed(1):'0';
  // Weekly chart
  const wa=d.weekly_attendance||[];
  const wMax=Math.max(...wa.map(w=>w.count),1);
  const dias=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  // Mini calendar
  const hoy=new Date();const mes=hoy.getMonth();const anio=hoy.getFullYear();
  const primerDia=new Date(anio,mes,1).getDay();const diasMes=new Date(anio,mes+1,0).getDate();
  const hoyDia=hoy.getDate();
  const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  // Holidays this month
  const holsThisMonth=(S.hols||[]).filter(h=>{const hd=new Date(h.date);return hd.getMonth()===mes&&hd.getFullYear()===anio});
  const holDays=holsThisMonth.map(h=>new Date(h.date).getDate());

  return`
  <!-- Greeting -->
  <div style="margin-bottom:24px"><div style="font-size:26px;font-weight:800;margin-bottom:4px">Buenos días, ${S.user.name.split(' ')[0]} 👋</div><div style="font-size:15px;color:var(--t2)">${new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'})} · ${activos.length} empleados activos</div></div>

  <!-- KPI Cards -->
  <div class="sg">
    <div class="cd st">
      <div class="st-l">Fichados Hoy</div>
      <div style="display:flex;align-items:baseline;gap:8px"><div class="st-v" style="color:var(--gn)">${d.clocked_in}</div><span style="font-size:14px;color:var(--tM);font-weight:500">/ ${d.active_employees}</span></div>
      <div style="margin-top:10px;height:6px;border-radius:3px;background:#f3f4f6;overflow:hidden"><div style="height:100%;border-radius:3px;background:var(--gn);width:${pctFichado}%;transition:width .5s"></div></div>
      <div class="st-s">${pctFichado}% del equipo</div>
    </div>
    <div class="cd st">
      <div class="st-l">Horas Hoy</div>
      <div class="st-v" style="color:var(--ac)">${d.today_hours}h</div>
      <div class="st-s">Media: ${avgH}h por persona</div>
    </div>
    <div class="cd st">
      <div class="st-l">Solicitudes</div>
      <div class="st-v" style="color:${d.pending_requests>0?'var(--am)':'var(--tM)'}">${d.pending_requests}</div>
      <div class="st-s">${d.pending_requests>0?'pendientes de aprobar':'todo al día ✓'}</div>
    </div>
    <div class="cd st">
      <div class="st-l">Vacaciones usadas</div>
      <div class="st-v" style="color:var(--pu)">${activos.reduce((s,e)=>s+(e.used_vacation_days||0),0)}</div>
      <div class="st-s">de ${activos.reduce((s,e)=>s+(e.vacation_days||22),0)} totales</div>
    </div>
  </div>

  <!-- Row: Chart + Calendar + Quick clock -->
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px">
    <!-- Weekly attendance chart -->
    <div class="cd cd-p">
      <div style="font-weight:700;font-size:16px;margin-bottom:16px">Asistencia semanal</div>
      <div style="display:flex;align-items:flex-end;gap:8px;height:120px">
        ${wa.map((w,i)=>{const h=Math.max(8,Math.round((w.count/wMax)*100));const d2=new Date(w.date+'T12:00:00');const dn=dias[d2.getDay()];const isToday=w.date===hoy.toISOString().slice(0,10);return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px"><div style="font-size:13px;font-weight:700;color:${isToday?'var(--ac)':'var(--t2)'}">${w.count}</div><div style="width:100%;height:${h}px;border-radius:6px;background:${isToday?'var(--ac)':'#f3f4f6'};transition:height .3s"></div><div style="font-size:11px;font-weight:${isToday?'700':'500'};color:${isToday?'var(--ac)':'var(--tM)'}">${dn}</div></div>`}).join('')}
      </div>
    </div>

    <!-- Mini Calendar -->
    <div class="cd cd-p">
      <div style="font-weight:700;font-size:16px;margin-bottom:12px">${meses[mes]} ${anio}</div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center">
        ${['L','M','X','J','V','S','D'].map(d2=>`<div style="font-size:11px;font-weight:600;color:var(--tM);padding:4px">${d2}</div>`).join('')}
        ${Array((primerDia===0?6:primerDia-1)).fill('<div></div>').join('')}
        ${Array.from({length:diasMes},(_, i)=>{const dia=i+1;const isHoy=dia===hoyDia;const isHol=holDays.includes(dia);const dow=new Date(anio,mes,dia).getDay();const isWe=dow===0||dow===6;return`<div style="font-size:13px;font-weight:${isHoy?'800':'500'};padding:5px 2px;border-radius:8px;${isHoy?'background:var(--ac);color:#fff;':isHol?'background:var(--amL);color:var(--am);':isWe?'color:var(--tM);':''}">${dia}</div>`}).join('')}
      </div>
      ${holsThisMonth.length>0?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid #f3f4f6">${holsThisMonth.slice(0,3).map(h=>`<div style="font-size:12px;color:var(--am);font-weight:500;margin-bottom:3px">📅 ${h.name} - ${fD(h.date)}</div>`).join('')}</div>`:''}
    </div>

    <!-- Team presence -->
    <div class="cd cd-p">
      <div style="font-weight:700;font-size:16px;margin-bottom:12px">Equipo ahora</div>
      <div style="display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto">
        ${activos.slice(0,12).map(e=>{const rec=d.today_records.find(r=>r.employee_name===e.name&&!r.clock_out);return`<div style="display:flex;align-items:center;gap:10px;padding:6px 0"><div style="width:8px;height:8px;border-radius:50%;background:${rec?'var(--gn)':'#e5e7eb'}"></div>${av(e.name,e.id,30,10)}<span style="flex:1;font-size:14px;font-weight:500">${e.name.split(' ').slice(0,2).join(' ')}</span><span style="font-size:12px;color:${rec?'var(--gn)':'var(--tM)'};font-weight:600">${rec?'Trabajando':'Ausente'}</span></div>`}).join('')}
      </div>
    </div>
  </div>

  <!-- Row: Activity + Pending requests -->
  <div class="g2">
    <div class="cd" style="padding:0">
      <div class="cd-h"><span>Actividad de Hoy</span><button class="btn bo bs" onclick="go('records')">Ver todo →</button></div>
      ${d.today_records.length===0?'<div class="empty">Sin fichajes hoy</div>':d.today_records.slice(0,8).map(r=>`<div style="display:flex;align-items:center;gap:12px;padding:14px 24px;border-bottom:1px solid #f5f5f5"><div style="width:8px;height:8px;border-radius:50%;background:${r.clock_out?'var(--tM)':'var(--gn)'}"></div>${av(r.employee_name,r.user_id,32,11)}<span style="flex:1;font-weight:500;font-size:14.5px">${r.employee_name}</span><span style="font-size:14px;color:var(--t2);font-weight:600">${fT(r.clock_in)}</span>${r.clock_out?`<span style="font-size:13px;color:var(--t2)">${fT(r.clock_out)}</span>`:''}${r.clock_out?bg('Completado','#9ca3af','#f3f4f6'):bg('Trabajando','#22c55e','#f0fdf4')}</div>`).join('')}
    </div>
    <div class="cd" style="padding:0">
      <div class="cd-h"><span>Solicitudes Pendientes</span><button class="btn bo bs" onclick="go('requests')">Ver todas →</button></div>
      ${d.pending_reqs.length===0?'<div class="empty" style="padding:48px">Todo al día 👍<br><span style="font-size:13px;color:var(--tM)">No hay solicitudes pendientes</span></div>':d.pending_reqs.map(r=>{const t=AT[r.type]||{l:r.type,c:'#64748b'};return`<div style="padding:16px 24px;border-bottom:1px solid #f5f5f5"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="display:flex;align-items:center;gap:10px">${av(r.employee_name,r.user_id,32,11)}<span style="font-weight:600;font-size:15px">${r.employee_name}</span></div>${bg(t.l,t.c)}</div><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;color:var(--tM)">${fD(r.start_date)}${r.end_date&&r.end_date!==r.start_date?' → '+fD(r.end_date):''}</span><div style="display:flex;gap:5px"><button class="btn bg2 bs" onclick="reviewReq(${r.id},'approved')">Aprobar</button><button class="btn bs bo" style="color:var(--rd)" onclick="rejectModal(${r.id})">Rechazar</button></div></div></div>`}).join('')}
    </div>
  </div>`;
}

// ── Clock ──
function clkH(){
  const me=S.emps.find(e=>e.id==S.user.id);
  const myVac=me?((me.vacation_days||22)-(me.used_vacation_days||0)):0;
  const myUsed=me?(me.used_vacation_days||0):0;
  const myTotal=me?(me.vacation_days||22):22;
  // Next holidays (upcoming)
  const today=new Date().toISOString().slice(0,10);
  const nextHols=S.hols.filter(h=>h.date>=today).slice(0,3);
  // My pending requests
  const myReqs=S.reqs.filter(r=>r.user_id==S.user?.id).slice(0,3);
  // My recent docs
  const myDocs=S.docs.filter(d=>d.user_id==S.user?.id).slice(0,3);

  const clockWidget=`<div class="cd" style="padding:0;overflow:hidden"><div style="padding:32px 28px;background:linear-gradient(135deg,var(--ac),#ff7e95);color:#fff;text-align:center"><div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;opacity:.7;margin-bottom:8px">${new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div><div id="lc" style="font-size:48px;font-weight:900;line-height:1;margin:10px 0">${new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</div><div id="cstat" style="font-size:13px;opacity:.85;margin-top:6px">Cargando estado...</div></div><div style="padding:20px 24px"><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><button class="btn" id="cbIn" style="padding:14px;font-size:15px;justify-content:center;border-radius:12px;background:#22c55e;color:white;font-weight:700;border:none;cursor:pointer" onclick="doClock('in')">▶ Entrada</button><button class="btn" id="cbOut" style="padding:14px;font-size:15px;justify-content:center;border-radius:12px;background:#ef4444;color:white;font-weight:700;border:none;cursor:pointer" onclick="doClock('out')">⏹ Salida</button></div><div id="cmsg" style="margin-top:10px"></div></div></div>`;

  const todayRecs=`<div class="cd" style="padding:16px 20px"><div style="font-size:11px;font-weight:700;color:var(--tM);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px">Mis fichajes de hoy</div><div id="trecs">Cargando...</div></div>`;

  const vacCard=`<div class="cd" style="padding:18px 20px"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:11px;font-weight:700;color:var(--tM);text-transform:uppercase;letter-spacing:.8px">Vacaciones</div><div style="font-size:32px;font-weight:900;color:var(--ac);margin-top:4px">${myVac}<span style="font-size:14px;font-weight:500;color:var(--tM)"> días libres</span></div><div style="font-size:12px;color:var(--t2);margin-top:2px">${myUsed} usados de ${myTotal}</div></div><div style="width:56px;height:56px;border-radius:50%;background:conic-gradient(var(--ac) ${Math.round((myUsed/myTotal)*100)}%, #f1f5f9 0);display:flex;align-items:center;justify-content:center"><div style="width:44px;height:44px;border-radius:50%;background:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--ac)">${Math.round((myVac/myTotal)*100)}%</div></div></div></div>`;

  const holCard=`<div class="cd" style="padding:18px 20px"><div style="font-size:11px;font-weight:700;color:var(--tM);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px">Próximos festivos</div>${nextHols.length===0?'<div style="font-size:13px;color:var(--tM)">Sin festivos próximos</div>':nextHols.map(h=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f8f8f8"><span style="font-size:13px;font-weight:600">${h.name||'Festivo'}</span><span style="font-size:12px;color:var(--ac);font-weight:600">${fD(h.date)}</span></div>`).join('')}</div>`;

  const reqCard=myReqs.length>0?`<div class="cd" style="padding:18px 20px"><div style="font-size:11px;font-weight:700;color:var(--tM);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px">Mis solicitudes</div>${myReqs.map(r=>{const t=AT[r.type]||{l:r.type,c:'#64748b'};const s=SM[r.status]||{};return`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f8f8f8"><div><span style="font-size:13px;font-weight:600">${t.l}</span> <span style="font-size:11px;color:var(--tM)">${fD(r.start_date)}${r.end_date&&r.end_date!==r.start_date?' → '+fD(r.end_date):''}</span></div>${bg(s.l||r.status,s.c||'#64748b',s.b||'#f1f5f9')}</div>`}).join('')}</div>`:'';

  const docCard=myDocs.length>0?`<div class="cd" style="padding:18px 20px"><div style="font-size:11px;font-weight:700;color:var(--tM);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px">Últimos documentos</div>${myDocs.map(d=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f8f8f8"><div style="font-size:13px;font-weight:600">${d.name}</div><div style="display:flex;gap:4px"><button class="btn bs bo" style="color:var(--ac);font-size:11px" onclick="viewDoc(${d.id})">👁 Ver</button></div></div>`).join('')}</div>`:'';

  return`<div style="max-width:900px;margin:0 auto"><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">${vacCard}${holCard}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px"><div>${clockWidget}${todayRecs}</div><div>${reqCard}${docCard}</div></div></div>`;
}
async function doClock(action){try{const d=await api('clock',{method:'POST',body:{action}});const m=d.action==='clock_in'?`<div class="tg" style="background:var(--gnL);color:var(--gn)">✅ Entrada registrada: ${fT(d.time)}</div>`:`<div class="tg" style="background:var(--acL);color:var(--ac)">✅ Salida registrada: ${fT(d.time)}</div>`;document.getElementById('cmsg').innerHTML=m;loadClk()}catch(e){document.getElementById('cmsg').innerHTML=`<div class="tg" style="background:var(--rdL);color:var(--rd)">${e.message}</div>`}}
async function loadClk(){try{const d=await api('clock');const el=document.getElementById('trecs');const stat=document.getElementById('cstat');const btnIn=document.getElementById('cbIn');const btnOut=document.getElementById('cbOut');if(!el)return;const clocked=d.is_clocked_in;if(stat){if(clocked){const rec=d.records?.find(r=>!r.clock_out);stat.innerHTML='🟢 Trabajando desde '+fT(rec?.clock_in)}else if(d.records?.length>0){const last=d.records[0];const hrs=dH(last.clock_in,last.clock_out).toFixed(1);stat.innerHTML='⚪ Jornada finalizada ('+hrs+'h)'}else{stat.innerHTML='⚪ Sin fichar hoy'}}if(btnIn){btnIn.style.opacity=clocked?'0.4':'1';btnIn.style.pointerEvents=clocked?'none':'auto'}if(btnOut){btnOut.style.opacity=clocked?'1':'0.4';btnOut.style.pointerEvents=clocked?'auto':'none'}if(!d.records||d.records.length===0){el.innerHTML='<div class="empty" style="padding:12px">Sin fichajes hoy</div>';return}el.innerHTML=d.records.map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f5f5f5"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:13px;background:var(--gnL);color:var(--gn);padding:3px 8px;border-radius:6px;font-weight:600">▶ ${fT(r.clock_in)}</span>${r.clock_out?`<span style="font-size:13px;background:var(--rdL);color:var(--rd);padding:3px 8px;border-radius:6px;font-weight:600">⏹ ${fT(r.clock_out)}</span>`:'<span style="font-size:13px;background:var(--gnL);color:var(--gn);padding:3px 8px;border-radius:6px;font-weight:600">En curso...</span>'}</div><span style="font-size:14px;color:var(--t2);font-weight:700">${r.clock_out?dH(r.clock_in,r.clock_out).toFixed(2)+'h':''}</span></div>`).join('')}catch(e){}}

// ── Employees ──
function empH(){
  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px"><div style="display:flex;gap:8px"><input placeholder="Buscar empleado..." class="inp" style="width:260px" id="empQ" oninput="fEmp()"></div><button class="btn bp" onclick="addEmpM()">+ Nuevo Empleado</button></div><div class="cd" style="padding:0;overflow:hidden"><table><thead><tr><th>Empleado</th><th>DNI</th><th>Puesto</th><th>Rol</th><th>Vacaciones</th><th>Estado</th><th>Acciones</th></tr></thead><tbody id="etb">${eRows(S.emps)}</tbody></table></div>`;
}
function eRows(l){return l.map(e=>`<tr onclick="pickE(${e.id})" style="cursor:pointer"><td><div style="display:flex;align-items:center;gap:12px">${av(e.name,e.id,40,14)}<div><div style="font-weight:600;font-size:14.5px">${e.name}</div><div style="font-size:12.5px;color:var(--tM)">${e.email}</div></div></div></td><td style="font-size:13.5px;color:var(--t2)">${e.dni||'—'}</td><td style="color:var(--t2);font-size:14px">${e.position||'—'}</td><td>${rBg(e.role)}</td><td><span class="vb"><span class="vb-f" style="width:${((e.used_vacation_days||0)/(e.vacation_days||22))*100}%;background:${(e.used_vacation_days||0)>15?'var(--rd)':'var(--ac)'}"></span></span><span style="font-size:13px;font-weight:600;color:var(--t2)">${e.used_vacation_days||0}/${e.vacation_days||22}</span></td><td>${sBg(e.is_active)}</td><td onclick="event.stopPropagation()"><div style="display:flex;gap:5px"><button class="btn bs bo" style="color:var(--ac)" onclick="editEmpM(${e.id})">Editar</button><button class="btn bs bo" style="color:var(--pu)" onclick="resetPwM(${e.id})" title="Resetear contraseña">🔑</button>${e.is_active==1?`<button class="btn bs bo" style="color:var(--am)" onclick="deactE(${e.id})">Desactivar</button>`:`<button class="btn bs bo" style="color:var(--gn)" onclick="actE(${e.id})">Activar</button><button class="btn bs bo" style="color:var(--rd)" onclick="delE(${e.id})">Eliminar</button>`}</div></td></tr>`).join('')}
function fEmp(){const q=(document.getElementById('empQ')?.value||'').toLowerCase();document.getElementById('etb').innerHTML=eRows(S.emps.filter(e=>e.name.toLowerCase().includes(q)||e.email.toLowerCase().includes(q)))}
function pickE(id){S.selEmp=S.emps.find(e=>e.id===id);loadReqs();loadDocs();render()}
async function deactE(id){if(!confirm('¿Desactivar este empleado? No podrá acceder al sistema.'))return;try{await api('employee_update',{method:'PUT',params:{id},body:{is_active:0}});loadAll()}catch(e){alert(e.message)}}
async function actE(id){if(!confirm('¿Reactivar este empleado?'))return;try{await api('employee_update',{method:'PUT',params:{id},body:{is_active:1}});loadAll()}catch(e){alert(e.message)}}
async function delE(id){if(!confirm('¿ELIMINAR definitivamente? Se borrarán todos sus datos. No se puede deshacer.'))return;try{await api('employee_delete',{method:'DELETE',params:{id}});loadAll()}catch(e){alert(e.message)}}

// ── Profile ──
let profMonth=new Date().getMonth(),profYear=new Date().getFullYear();
function profCalendar(e){
  const myR=S.reqs.filter(r=>r.user_id==e.id&&r.status==='approved');
  const d=new Date(profYear,profMonth,1);
  const mName=d.toLocaleDateString('es-ES',{month:'long',year:'numeric'});
  const first=d.getDay()||7;const days=new Date(profYear,profMonth+1,0).getDate();
  let cells='';
  for(let i=1;i<first;i++)cells+='<div></div>';
  for(let day=1;day<=days;day++){
    const ds=`${profYear}-${String(profMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isHol=S.hols.some(h=>h.date===ds);
    const isWknd=(new Date(profYear,profMonth,day).getDay()%6===0);
    const absence=myR.find(r=>{
      if(r.start_date<=ds&&(r.end_date>=ds||(!r.end_date&&r.start_date===ds)))return true;
      return false;
    });
    const isToday=ds===new Date().toISOString().slice(0,10);
    let bg='',cl='var(--tx)',title='';
    if(isHol){bg='#fef2f2';cl='#ef4444';title=S.hols.find(h=>h.date===ds)?.name||'Festivo'}
    else if(absence){
      const at=AT[absence.type]||{c:'#64748b',l:absence.type};
      bg=at.c+'20';cl=at.c;title=at.l;
    }
    else if(isWknd){bg='#f9fafb';cl='#9ca3af'}
    cells+=`<div style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:13px;font-weight:${isToday?'800':'500'};background:${bg};color:${cl};${isToday?'outline:2px solid var(--ac);outline-offset:-1px':''}${title?';cursor:help':''}" ${title?`title="${title}"`:''}>${day}</div>`;
  }

e:14.5px;font-weight:700;color:#78350f">${v}</span></div>`).join('')}</div></div>`:''}<div class="cd cd-p"><div style="font-weight:700;font-size:16px;margin-bottom:14px">Solicitudes (${myR.length})</div>${myR.length===0?'<div class="empty" style="padding:12px">Sin solicitudes</div>':myR.slice(0,6).map(r=>{const t=AT[r.type]||{l:r.type,c:'#64748b'};const s=SM[r.status]||{};return`<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid #f5f5f5"><div style="flex:1"><span style="font-size:13px;font-weight:600">${t.l}</span> <span style="font-size:12px;color:var(--tM)">${fD(r.start_date)}${r.end_date&&r.end_date!==r.start_date?' → '+fD(r.end_date):''}</span></div>${bg(s.l||r.status,s.c||'#64748b',s.b||'#f1f5f9')}</div>`}).join('')}</div><div class="cd cd-p"><div style="font-weight:700;font-size:16px;margin-bottom:14px">Documentos (${myD.length})</div>${myD.length===0?'<div class="empty" style="padding:12px">Sin documentos</div>':myD.slice(0,6).map(d=>`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f5f5f5"><div style="width:36px;height:36px;border-radius:8px;background:var(--acL);display:flex;align-items:center;justify-content:center;font-size:16px">📄</div><div style="flex:1"><div style="font-size:14px;font-weight:600">${d.name}</div><div style="font-size:12px;color:var(--tM)">${d.category} · ${fD(d.date)}</div></div><div style="display:flex;gap:4px"><button class="btn bs bo" style="color:var(--ac)" onclick="viewDoc(${d.id})" title="Ver">👁</button><button class="btn bs bo" style="color:var(--gn)" onclick="dlDoc(${d.id})" title="Descargar">⬇</button></div></div>`).join('')}</div></div>`; 
}

function editRecM(id){const r=S.recs.find(x=>x.id===id||x.id==id);if(!r)return;const ci=r.clock_in?r.clock_in.replace(' ','T').slice(0,19):'';const co=r.clock_out?r.clock_out.replace(' ','T').slice(0,19):'';modal('Editar Registro — '+r.employee_name,`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label>Entrada</label><input type="datetime-local" class="inp" id="rci" value="${ci}" step="1"></div><div class="fg"><label>Salida</label><input type="datetime-local" class="inp" id="rco" value="${co}" step="1"></div></div><div class="fg"><label>Notas</label><textarea class="inp" id="rnote" rows="2" placeholder="Opcional">${r.notes||''}</textarea></div><button class="btn bp" style="width:100%;justify-content:center;margin-top:8px" onclick="saveRecEdit(${id})">Guardar Cambios</button>`)}

async function saveRecEdit(id){const ciRaw=document.getElementById('rci')?.value||'';const coRaw=document.getElementById('rco')?.value||'';const notes=document.getElementById('rnote')?.value||'';if(!ciRaw)return alert('La entrada es obligatoria');const ci=ciRaw.replace('T',' ');const co=coRaw?coRaw.replace('T',' '):null;try{await api('record_update',{method:'PUT',params:{id},body:{clock_in:ci,clock_out:co,notes}});document.querySelector('.mo')?.remove();loadRecs(rM)}catch(e){alert(e.message)}}

let reqMo=new Date().getMonth(),reqYr=new Date().getFullYear();

function miniCal(mo,yr){
  const reqs=S.reqs.filter(r=>r.user_id==S.user.id);
  const d=new Date(yr,mo,1);const mN=d.toLocaleDateString('es-ES',{month:'short'}).replace('.','');
  const first=d.getDay()||7;const days=new Date(yr,mo+1,0).getDate();
  let c='';for(let i=1;i<first;i++)c+='<div></div>';
  for(let day=1;day<=days;day++){
    const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const hol=S.hols.find(h=>h.date===ds);const wk=new Date(yr,mo,day).getDay()%6===0;
    const ap=reqs.find(r=>r.status==='approved'&&r.start_date<=ds&&(r.end_date||r.start_date)>=ds);
    const pe=reqs.find(r=>r.status==='pending'&&r.start_date<=ds&&(r.end_date||r.start_date)>=ds);
    const td=ds===new Date().toISOString().slice(0,10);
    let bg2='',cl='#333',tt='',bd='';
    if(hol){bg2='#fee2e2';cl='#dc2626';tt=hol.name||'Festivo'}
    else if(ap){const a=AT[ap.type]||{c:'#64748b',l:ap.type};bg2=a.c+'30';cl=a.c;tt=a.l}
    else if(pe){const a=AT[pe.type]||{c:'#64748b',l:pe.type};bg2='#fff';cl=a.c;bd=`border:1.5px dashed ${a.c}`;tt='Pendiente'}
    else if(wk){bg2='#f5f5f5';cl='#bbb'}
    c+=`<div style="width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:5px;font-size:12px;font-weight:${td?'800':'500'};background:${bg2};color:${cl};${td?'box-shadow:0 0 0 2px var(--ac);':''}${bd}" ${tt?`title="${tt}"`:''}>${day}</div>`;
  }
  return`<div style="min-width:260px"><div style="font-weight:700;font-size:12px;text-align:center;margin-bottom:4px;text-transform:capitalize">${mN} ${yr}</div><div style="display:grid;grid-template-columns:repeat(7,34px);gap:2px;justify-content:center">${'LMXJVSD'.split('').map(x=>`<div style="font-size:9px;color:#999;font-weight:700;text-align:center;line-height:18px">${x}</div>`).join('')}${c}</div></div>`;
}

function ganttChart(){
  const mo=reqMo,yr=reqYr;const days=new Date(yr,mo+1,0).getDate();
  const mN=new Date(yr,mo,1).toLocaleDateString('es-ES',{month:'long',year:'numeric'});
  const allReqs=S.reqs.filter(r=>r.status==='approved'||r.status==='pending');
  const empMap={};allReqs.forEach(r=>{const ms=`${yr}-${String(mo+1).padStart(2,'0')}-01`;const me=`${yr}-${String(mo+1).padStart(2,'0')}-${String(days).padStart(2,'0')}`;if(r.start_date<=me&&(r.end_date||r.start_date)>=ms){if(!empMap[r.user_id])empMap[r.user_id]={name:r.employee_name,reqs:[]};empMap[r.user_id].reqs.push(r)}});
  const holDays={};S.hols.forEach(h=>{if(h.date.startsWith(`${yr}-${String(mo+1).padStart(2,'0')}`))holDays[parseInt(h.date.slice(8,10))]=h.name});
  const dw=['D','L','M','X','J','V','S'];
  let dayH='';for(let d=1;d<=days;d++){const wd=new Date(yr,mo,d).getDay();const wk=wd===0||wd===6;const isHol=holDays[d];const td=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`===new Date().toISOString().slice(0,10);dayH+=`<div style="text-align:center;font-size:11px;min-width:34px;${wk?'color:#ccc;':'color:#666;'}${isHol?'color:#ef4444;':''}${td?'font-weight:900;color:var(--ac);':''}"><div>${dw[wd]}</div><div style="font-weight:700;font-size:10px">${d}</div></div>`}
  let rows='';const empIds=Object.keys(empMap);
  if(empIds.length===0)rows=`<div style="padding:20px;text-align:center;color:var(--tM);font-size:13px">Sin ausencias este mes</div>`;
  empIds.forEach(uid=>{const emp=empMap[uid];let bars='';for(let d=1;d<=days;d++){const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const wd=new Date(yr,mo,d).getDay();const wk=wd===0||wd===6;const isHol=holDays[d];const req=emp.reqs.find(r=>r.start_date<=ds&&(r.end_date||r.start_date)>=ds);let bg2='transparent',tt='';if(isHol){bg2='#fee2e2';tt=isHol}else if(req){const at=AT[req.type]||{c:'#64748b',l:req.type};bg2=req.status==='pending'?at.c+'40':at.c+'80';tt=(req.status==='pending'?'Pendiente: ':'')+ at.l}else if(wk){bg2='#f9f9f9'}bars+=`<div style="min-width:34px;height:30px;background:${bg2};border-radius:2px" ${tt?`title="${tt}"`:''}></div>`}rows+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><div style="min-width:120px;max-width:120px;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${emp.name}">${emp.name.split(' ').slice(0,2).join(' ')}</div><div style="display:flex;gap:1px">${bars}</div></div>`});
  let oRow='';for(let d=1;d<=days;d++){const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;let cnt=0;const names=[];allReqs.forEach(r=>{if((r.status==='approved'||r.status==='pending')&&r.start_date<=ds&&(r.end_date||r.start_date)>=ds){cnt++;names.push(r.employee_name)}});const bg2=cnt>=3?'#ef4444':cnt===2?'#f59e0b':cnt===1?'#22c55e':'transparent';oRow+=`<div style="min-width:34px;height:22px;background:${bg2};border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:${cnt>0?'white':'transparent'}" ${cnt>1?`title="Coinciden: ${names.join(', ')}"`:''}>${cnt>0?cnt:''}</div>`}
  return`<div class="cd cd-p" style="margin-bottom:18px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><button class="btn bs bo" onclick="reqMo--;if(reqMo<0){reqMo=11;reqYr--}render()">◀</button><div style="font-weight:700;font-size:16px;text-transform:capitalize">📊 ${mN}</div><button class="btn bs bo" onclick="reqMo++;if(reqMo>11){reqMo=0;reqYr++}render()">▶</button></div><div style="overflow-x:auto"><div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid #eee"><div style="min-width:120px;font-size:11px;font-weight:700;color:var(--tM)">EMPLEADO</div><div style="display:flex;gap:1px">${dayH}</div></div>${rows}<div style="display:flex;align-items:center;gap:6px;margin-top:4px;padding-top:4px;border-top:1px solid #eee"><div style="min-width:120px;font-size:11px;font-weight:700;color:var(--tM)">COINCIDEN</div><div style="display:flex;gap:1px">${oRow}</div></div></div><div style="margin-top:10px;display:flex;gap:10px;flex-wrap:wrap;font-size:10px">${Object.entries(AT).map(([k,v])=>`<span style="display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;border-radius:2px;background:${v.c}80"></span>${v.l}</span>`).join('')}<span style="display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;border-radius:2px;background:#fee2e2"></span>Festivo</span><span style="display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;border-radius:2px;background:#22c55e"></span>1</span><span style="display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;border-radius:2px;background:#f59e0b"></span>2</span><span style="display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;border-radius:2px;background:#ef4444"></span>3+</span></div></div>`;
}

function reqH(){
  const me=S.emps.find(e=>e.id==S.user.id);const myVac=me?((me.vacation_days||22)-(me.used_vacation_days||0)):0;const myTotal=me?(me.vacation_days||22):22;const myUsed=me?(me.used_vacation_days||0):0;

  return`${!isA()?empCal:adminView}<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><select class="inp" style="width:auto" onchange="loadReqs(this.value)"><option value="all">Todas</option><option value="pending">Pendientes</option><option value="approved">Aprobadas</option><option value="rejected">Rechazadas</option></select><button class="btn bp" onclick="newReqM()">+ Solicitud</button></div><div class="cd" style="padding:0;overflow:hidden">${S.reqs.length===0?'<div class="empty">Sin solicitudes</div>':`<table><thead><tr><th>Empleado</th><th>Tipo</th><th>Fechas</th><th>Estado</th><th>Adjunto</th>${isA()?'<th>Acciones</th>':''}</tr></thead><tbody>${S.reqs.map(r=>{const t=AT[r.type]||{l:r.type,c:'#64748b'};const s=SM[r.status]||{};return`<tr><td style="font-weight:600">${r.employee_name}</td><td>${bg(t.l,t.c)}</td><td style="font-size:12px;color:var(--t2)">${r.partial==1?fD(r.start_date)+' '+r.time_from+'→'+r.time_to:fD(r.start_date)+(r.end_date&&r.end_date!==r.start_date?' → '+fD(r.end_date):'')}</td><td>${bg(s.l||r.status,s.c||'#64748b',s.b||'#f1f5f9')}</td><td>${r.attachment_path?`<button class="btn bs bo" style="color:var(--ac)" onclick="viewAttach('${r.attachment_path}')" title="${r.attachment_name||'Adjunto'}">📎 Ver</button>`:`<button class="btn bs bo" style="color:var(--tM)" onclick="attachFile(${r.id})" title="Adjuntar justificante">📎 Subir</button>`}</td>${isA()&&r.status==='pending'?`<td><div style="display:flex;gap:3px"><button class="btn bg2 bs" onclick="reviewReq(${r.id},'approved')">Aprobar</button><button class="btn bs bo" style="color:var(--rd)" onclick="rejectModal(${r.id})">Rechazar</button></div></td>`:(isA()?'<td style="color:var(--tM)">—</td>':'')}</tr>`}).join('')}</tbody></table>`}</div>`}

async function uploadPay(){const f=document.getElementById('payF').files;if(!f.length)return;const month=document.getElementById('payMonth')?.value||new Date().toISOString().slice(0,7);const fd=new FormData();for(let i=0;i<f.length;i++)fd.append('files[]',f[i]);fd.append('month',month);const el=document.getElementById('payRes');el.innerHTML='<div class="tg" style="background:var(--amL);color:var(--am)">⏳ Procesando '+f.length+' archivo(s)... Separando nóminas por DNI (puede tardar hasta 2 minutos)...</div>';try{const ctrl=new AbortController();const timer=setTimeout(()=>ctrl.abort(),180000);const r=await fetch(`${API}?action=payroll_upload&token=${encodeURIComponent(S.token)}`,{method:'POST',body:fd,signal:ctrl.signal});clearTimeout(timer);const txt=await r.text();let d;try{d=JSON.parse(txt)}catch(pe){el.innerHTML=`<div class="tg" style="background:var(--rdL);color:var(--rd)">Error del servidor: ${txt.substring(0,300)}</div>`;return}if(!r.ok){el.innerHTML=`<div class="tg" style="background:var(--rdL);color:var(--rd)">${d.error||'Error desconocido'}</div>`;return}let matched=0,unmatched=0,skipped=0;let h='<div style="margin-top:12px">';(d.results||[]).forEach(r=>{if(r.status==='matched'){matched++;h+=`<div class="tg" style="background:var(--gnL);color:var(--gn);margin-bottom:4px">✅ ${r.employee} (${r.dni})</div>`}else if(r.status==='skipped'){skipped++;h+=`<div class="tg" style="background:var(--amL);color:var(--am);margin-bottom:4px">⚠️ ${r.employee} — ${r.reason}</div>`}else{unmatched++;h+=`<div class="tg" style="background:var(--rdL);color:var(--rd);margin-bottom:4px">❌ ${r.file||'Página'} — ${r.reason||'No asignado'}</div>`}});h+=`</div><div style="margin-top:12px;padding:14px;border-radius:10px;background:#fafafa;font-size:14px"><strong>Resumen:</strong> ${matched} asignadas, ${skipped} ya existían, ${unmatched} sin asignar</div>`;el.innerHTML=h;loadDocs()}catch(e){el.innerHTML=`<div class="tg" style="background:var(--rdL);color:var(--rd)">${e.name==='AbortError'?'Timeout: el proceso tardó demasiado. Prueba con un PDF más pequeño.':e.message}</div>`}}

function saveVacBase(){const v=document.getElementById('vacBase')?.value||'22';localStorage.setItem('ft2_vacbase',v);alert('Días base guardados: '+v+' días')}

async function saveBulkVac(){
  const type=document.getElementById('bulkType')?.value;
  const from=document.getElementById('bulkFrom')?.value;
  const to=document.getElementById('bulkTo')?.value;
  const notes=document.getElementById('bulkNotes')?.value||'';
  const checks=document.querySelectorAll('.bulk-chk:checked');
  const empIds=[...checks].map(c=>c.value);
  if(!from)return alert('Selecciona fecha de inicio');
  if(empIds.length===0)return alert('Selecciona al menos un empleado');
  const el=document.getElementById('bulkRes');
  el.innerHTML='<div class="tg" style="background:var(--amL);color:var(--am)">⏳ Creando '+empIds.length+' solicitudes...</div>';
  let ok=0,err=0;
  for(const eid of empIds){
    try{
      await api('requests',{method:'POST',body:{type,start_date:from,end_date:to||from,user_id:parseInt(eid),notes,partial:0}});
      ok++;
    }catch(e){err++}
  }
  el.innerHTML=`<div class="tg" style="background:var(--gnL);color:var(--gn)">✅ ${ok} solicitudes creadas${err>0?' · '+err+' errores':''}</div>`;
  // Auto-approve all
  try{
    const reqs=(await api('requests')).requests||[];
    const pending=reqs.filter(r=>r.status==='pending'&&r.notes===notes&&r.start_date===from);
    for(const r of pending){await api('request_review',{method:'PUT',params:{id:r.id},body:{status:'approved'}})}
    el.innerHTML+=`<div class="tg" style="background:var(--gnL);color:var(--gn);margin-top:4px">✅ Todas aprobadas automáticamente</div>`;
  }catch(e){}
  loadAll();
}

function calcTurnoH(){const h1=document.getElementById('th1')?.value,h2=document.getElementById('th2')?.value,br=document.getElementById('tbr')?.value||'';if(!h1||!h2)return;const[h1h,h1m]=h1.split(':').map(Number),[h2h,h2m]=h2.split(':').map(Number);let mins=(h2h*60+h2m)-(h1h*60+h1m);if(mins<0)mins+=1440;if(br&&br.includes('-')){const[b1,b2]=br.split('-').map(s=>s.trim());if(b1&&b2){const[b1h,b1m]=b1.split(':').map(Number),[b2h,b2m]=b2.split(':').map(Number);let bm=(b2h*60+b2m)-(b1h*60+b1m);if(bm>0)mins-=bm}}document.getElementById('thd').value=(mins/60).toFixed(1)}

function addTurnoM(){modal('Nuevo Turno',`<div class="fg"><label>Nombre del turno *</label><input class="inp" id="tn" placeholder="Ej: Jornada Continua Mañana"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label>Hora inicio *</label><input class="inp" id="th1" type="time" value="09:00" onchange="calcTurnoH()"></div><div class="fg"><label>Hora fin *</label><input class="inp" id="th2" type="time" value="15:00" onchange="calcTurnoH()"></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label>Horas/día (auto-calculado)</label><input class="inp" id="thd" type="number" step="0.5" value="6.0" readonly style="font-weight:700;background:#fafafa"></div><div class="fg"><label>Pausa (opcional, ej: 14:00-14:30)</label><input class="inp" id="tbr" placeholder="Ej: 14:00-14:30" onchange="calcTurnoH()"></div></div><div class="fg"><label>Color</label><div style="display:flex;gap:6px;margin-top:4px">${['#009DDD','#6366f1','#22c55e','#f59e0b','#8b5cf6','#14b8a6','#3b82f6','#ef4444'].map(c=>`<div onclick="document.getElementById('tcol').value='${c}';this.parentElement.querySelectorAll('div').forEach(d=>d.style.outline='');this.style.outline='3px solid ${c}';this.style.outlineOffset='2px'" style="width:32px;height:32px;border-radius:8px;background:${c};cursor:pointer"></div>`).join('')}<input type="hidden" id="tcol" value="#009DDD"></div></div><button class="btn bp" style="width:100%;justify-content:center;margin-top:10px" onclick="saveTurno()">Crear Turno</button>`)}

async function saveTurno(){calcTurnoH();const n=document.getElementById('tn')?.value;const h1=document.getElementById('th1')?.value;const h2=document.getElementById('th2')?.value;if(!n||!h1||!h2)return alert('Nombre y horario obligatorios');try{await api('shifts',{method:'POST',body:{name:n,start_time:h1,end_time:h2,daily_hours:document.getElementById('thd')?.value||'7.5',break_time:document.getElementById('tbr')?.value||'',color:document.getElementById('tcol')?.value||'#009DDD'}});document.querySelector('.mo')?.remove();await loadShifts()}catch(e){alert(e.message)}}

function editTurnoM(id,name,h1,h2,dh,br,col){modal('Editar Turno: '+name,`<div class="fg"><label>Nombre</label><input class="inp" id="tn" value="${name}"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label>Hora inicio</label><input class="inp" id="th1" type="time" value="${h1||'09:00'}" onchange="calcTurnoH()"></div><div class="fg"><label>Hora fin</label><input class="inp" id="th2" type="time" value="${h2||'15:00'}" onchange="calcTurnoH()"></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label>Horas/día (auto-calculado)</label><input class="inp" id="thd" type="number" step="0.5" value="${dh||'7.5'}" readonly style="font-weight:700;background:#fafafa"></div><div class="fg"><label>Pausa</label><input class="inp" id="tbr" value="${br||''}" onchange="calcTurnoH()"></div></div><input type="hidden" id="told" value="${name}"><button class="btn bp" style="width:100%;justify-content:center;margin-top:10px" onclick="updateTurno(${id})">Guardar Cambios</button>`)}

async function updateTurno(id){calcTurnoH();try{await api('shift_update',{method:'PUT',params:{id},body:{name:document.getElementById('tn')?.value,start_time:document.getElementById('th1')?.value,end_time:document.getElementById('th2')?.value,daily_hours:document.getElementById('thd')?.value||'7.5',break_time:document.getElementById('tbr')?.value||'',old_name:document.getElementById('told')?.value}});document.querySelector('.mo')?.remove();await loadShifts();await loadAll()}catch(e){alert(e.message)}}

async function delTurno(id,name){if(!confirm('¿Eliminar turno "'+name+'"? Los empleados asignados quedarán sin turno.'))return;try{await api('shift_update',{method:'DELETE',params:{id}});await loadShifts();await loadAll()}catch(e){alert(e.message)}}

async function assignTurno(empId,turno){try{await api('employee_update',{method:'PUT',params:{id:empId},body:{schedule:turno}});loadAll()}catch(e){alert(e.message)}}

function modal(title,body){const o=document.createElement('div');o.className='mo';o.onclick=e=>{if(e.target===o)o.remove()};o.innerHTML=`<div class="mo-c"><div class="mo-h"><h3>${title}</h3><button class="mo-x" onclick="this.closest('.mo').remove()">✕</button></div><div class="mo-b">${body}</div></div>`;document.body.appendChild(o)}

// Add Employee
function addEmpM(){const vacDays=parseInt(localStorage.getItem('ft2_vacbase'))||22;modal('Nuevo Empleado',`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label>Nombre *</label><input class="inp" id="en"></div><div class="fg"><label>DNI *</label><input class="inp" id="ed" placeholder="12345678A" oninput="document.getElementById('epw').value=this.value"></div><div class="fg"><label>Email *</label><input class="inp" id="ee" type="email"></div><div class="fg"><label>Teléfono</label><input class="inp" id="ep"></div><div class="fg"><label>Puesto</label><input class="inp" id="epos" value="Agente Comercial"></div><div class="fg"><label>Rol</label><select class="inp" id="er"><option value="agent">Agente</option><option value="supervisor">Supervisor</option><option value="admin">Admin</option></select></div><div class="fg"><label>Contraseña (por defecto = DNI)</label><input class="inp" id="epw" placeholder="Se rellena con el DNI"></div><div class="fg"><label>PIN (4 dígitos)</label><input class="inp" id="epin" maxlength="4"></div><div class="fg"><label>Días vacaciones</label><input class="inp" id="ev" type="number" value="${vacDays}"></div><div class="fg"><label>Fecha alta</label><input class="inp" id="esd" type="date"></div><div class="fg"><label>Turno</label><select class="inp" id="eturno">${getTurnoOptions()}</select></div></div><button class="btn bp" style="width:100%;justify-content:center;margin-top:10px" onclick="saveNewEmp()">Guardar</button>`)}

async function saveNewEmp(){const dni=document.getElementById('ed').value;const b={name:document.getElementById('en').value,dni:dni,email:document.getElementById('ee').value,phone:document.getElementById('ep').value,position:document.getElementById('epos').value,role:document.getElementById('er').value,password:document.getElementById('epw').value||dni||'1234',pin:document.getElementById('epin').value||null,vacation_days:parseInt(document.getElementById('ev').value)||22,start_date:document.getElementById('esd').value||null,schedule:document.getElementById('eturno')?.value||null};if(!b.name||!b.email)return alert('Nombre y email obligatorios');if(!b.dni)return alert('DNI obligatorio (se usa como contraseña)');try{await api('employees',{method:'POST',body:b});document.querySelector('.mo')?.remove();loadAll()}catch(e){alert(e.message)}}

// Edit Employee
function resetPwM(id){const e=S.emps.find(x=>x.id===id);if(!e)return;const defPw=e.dni||'1234';modal('Resetear Contraseña — '+e.name,`<div style="text-align:center;margin-bottom:16px"><div style="font-size:40px;margin-bottom:8px">🔑</div><div style="font-size:14px;color:var(--t2)">La contraseña se reseteará a:</div></div><div class="fg"><label>Nueva contraseña</label><input class="inp" id="rpw" value="${defPw}" style="font-size:18px;font-weight:700;text-align:center"></div><div style="font-size:12px;color:var(--tM);margin-bottom:14px">Por defecto se usa el DNI del empleado. Puedes escribir otra si prefieres.</div><button class="btn bp" style="width:100%;justify-content:center" onclick="doResetPw(${e.id})">Resetear Contraseña</button>`)}
async function doResetPw(id){const pw=document.getElementById('rpw')?.value;if(!pw)return alert('Escribe una contraseña');try{await api('reset_password',{method:'POST',body:{user_id:id,password:pw}});document.querySelector('.mo')?.remove();alert('✅ Contraseña reseteada correctamente');loadAll()}catch(e){alert(e.message)}}

function editEmpM(id){const e=S.emps.find(x=>x.id===id);if(!e)return;modal('Editar: '+e.name,`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label>Nombre</label><input class="inp" id="uen" value="${e.name}"></div><div class="fg"><label>DNI</label><input class="inp" id="ued" value="${e.dni||''}"></div><div class="fg"><label>Email</label><input class="inp" id="uee" value="${e.email}"></div><div class="fg"><label>Teléfono</label><input class="inp" id="uep" value="${e.phone||''}"></div><div class="fg"><label>Puesto</label><input class="inp" id="uepos" value="${e.position||''}"></div><div class="fg"><label>Rol</label><select class="inp" id="uer"><option value="agent" ${e.role==='agent'?'selected':''}>Agente</option><option value="supervisor" ${e.role==='supervisor'?'selected':''}>Supervisor</option><option value="admin" ${e.role==='admin'?'selected':''}>Admin</option></select></div><div class="fg"><label>Nueva contraseña (vacío = no cambiar)</label><input class="inp" id="uepw" placeholder="Sin cambios"></div><div class="fg"><label>PIN</label><input class="inp" id="uepin" value="${e.pin||''}" maxlength="4"></div><div class="fg"><label>Días vacaciones</label><input class="inp" id="uev" type="number" value="${e.vacation_days||22}"></div><div class="fg"><label>Usados</label><input class="inp" id="uevu" type="number" value="${e.used_vacation_days||0}"></div><div class="fg"><label>Turno / Horario</label><select class="inp" id="uesch">${getTurnoOptions(e.schedule)}</select></div><div class="fg"><label>Fecha alta</label><input class="inp" id="uesd" type="date" value="${e.start_date||''}"></div></div><button class="btn bp" style="width:100%;justify-content:center;margin-top:10px" onclick="saveEditEmp(${e.id})">Guardar Cambios</button>`)}

async function saveEditEmp(id){const b={name:document.getElementById('uen').value,dni:document.getElementById('ued').value,email:document.getElementById('uee').value,phone:document.getElementById('uep').value,position:document.getElementById('uepos').value,role:document.getElementById('uer').value,pin:document.getElementById('uepin').value||null,vacation_days:parseInt(document.getElementById('uev').value),used_vacation_days:parseInt(document.getElementById('uevu').value),schedule:document.getElementById('uesch').value,start_date:document.getElementById('uesd').value||null};const pw=document.getElementById('uepw').value;if(pw)b.password=pw;try{await api('employee_update',{method:'PUT',params:{id},body:b});document.querySelector('.mo')?.remove();loadAll()}catch(e){alert(e.message)}}

// New Request
function newReqM(){modal('Nueva Solicitud',`${isA()?`<div class="fg"><label>Empleado</label><select class="inp" id="re">${S.emps.filter(e=>e.is_active==1).map(e=>`<option value="${e.id}">${e.name}</option>`).join('')}</select></div>`:''}<div class="fg"><label>Tipo</label><select class="inp" id="rt" onchange="togP()">${Object.entries(AT).map(([k,v])=>`<option value="${k}">${v.l}</option>`).join('')}</select></div><div id="fd"><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label>Fecha inicio</label><input type="date" class="inp" id="rs"></div><div class="fg"><label>Fecha fin</label><input type="date" class="inp" id="rf"></div></div></div><div id="pd" style="display:none"><div class="fg"><label>Fecha</label><input type="date" class="inp" id="rpd"></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px"><div class="fg"><label>Hora desde</label><input type="time" class="inp" id="rtf" onchange="calcHr()"></div><div class="fg"><label>Hora hasta</label><input type="time" class="inp" id="rtt" onchange="calcHr()"></div><div class="fg"><label>Horas</label><input type="number" class="inp" id="rh" step="0.5" readonly style="font-weight:700;background:#f8fafc"></div></div></div><div class="fg"><label>Notas</label><textarea class="inp" id="rn" rows="2"></textarea></div><button class="btn bp" style="width:100%;justify-content:center;margin-top:6px" onclick="saveReq()">Enviar</button>`)}

function togP(){const t=document.getElementById('rt').value;const p=AT[t]?.p;document.getElementById('fd').style.display=p?'none':'block';document.getElementById('pd').style.display=p?'block':'none'}
function calcHr(){const f=document.getElementById('rtf')?.value,t=document.getElementById('rtt')?.value;if(f&&t){const[fh,fm]=f.split(':').map(Number),[th,tm]=t.split(':').map(Number);document.getElementById('rh').value=Math.max(0,((th*60+tm)-(fh*60+fm))/60).toFixed(1)}}

async function saveReq(){const t=document.getElementById('rt').value,p=AT[t]?.p;const b={type:t,user_id:isA()?parseInt(document.getElementById('re')?.value):S.user.id,partial:p?1:0,notes:document.getElementById('rn')?.value||null};if(p){b.start_date=document.getElementById('rpd')?.value;b.time_from=document.getElementById('rtf')?.value;b.time_to=document.getElementById('rtt')?.value;b.hours_requested=parseFloat(document.getElementById('rh')?.value)||0}else{b.start_date=document.getElementById('rs')?.value;b.end_date=document.getElementById('rf')?.value}if(!b.start_date)return alert('Selecciona fecha');try{await api('requests',{method:'POST',body:b});document.querySelector('.mo')?.remove();loadReqs()}catch(e){alert(e.message)}}

// Upload Document
function uploadDocM(){modal('Subir Documento',`<div class="fg"><label>Empleado</label><select class="inp" id="de">${S.emps.filter(e=>e.is_active==1).map(e=>`<option value="${e.id}">${e.name}</option>`).join('')}</select></div><div class="fg"><label>Categoría</label><select class="inp" id="dc"><option value="payroll">Nómina</option><option value="contract">Contrato</option><option value="certificate">Certificado</option><option value="medical">Médico</option><option value="other">Otro</option></select></div><div class="fg"><label>Nombre</label><input class="inp" id="dn" placeholder="Ej: Nómina Enero 2026"></div><div class="fg"><label>Fecha</label><input type="date" class="inp" id="dd"></div><div class="fg"><label>Archivo</label><input type="file" class="inp" id="df" accept=".pdf,.jpg,.jpeg,.png"></div><button class="btn bp" style="width:100%;justify-content:center;margin-top:8px" onclick="saveDocs()">Subir</button>`)}

async function saveDocs(){const f=document.getElementById('df')?.files[0];if(!f)return alert('Selecciona archivo');const fd=new FormData();fd.append('file',f);fd.append('user_id',document.getElementById('de').value);fd.append('category',document.getElementById('dc').value);fd.append('name',document.getElementById('dn').value||f.name);fd.append('date',document.getElementById('dd').value||new Date().toISOString().slice(0,10));try{await api('documents',{method:'POST',body:fd,isForm:true});document.querySelector('.mo')?.remove();loadDocs()}catch(e){alert(e.message)}}

// Add App Credential
function addCredM(shared){modal('Nueva Credencial',`<div class="fg"><label>Aplicación *</label><input class="inp" id="ca" placeholder="Ej: Pipedrive, CloudTalk..."></div><div class="fg"><label>URL</label><input class="inp" id="cu" placeholder="https://..."></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label>Usuario</label><input class="inp" id="cuser"></div><div class="fg"><label>Contraseña</label><input class="inp" id="cpw"></div></div><div class="fg"><label>Notas</label><textarea class="inp" id="cn" rows="2"></textarea></div><input type="hidden" id="cshared" value="${shared?'1':'0'}"><button class="btn bp" style="width:100%;justify-content:center;margin-top:8px" onclick="saveCred()">Guardar</button>`)}

function editCredM(id){const c=S.appCreds.find(x=>x.id===id||x.id==id);if(!c)return;modal('Editar Credencial',`<div class="fg"><label>Aplicación *</label><input class="inp" id="ca" value="${(c.app_name||'').replace(/"/g,'&quot;')}"></div><div class="fg"><label>URL</label><input class="inp" id="cu" value="${(c.app_url||'').replace(/"/g,'&quot;')}"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label>Usuario</label><input class="inp" id="cuser" value="${(c.username||'').replace(/"/g,'&quot;')}"></div><div class="fg"><label>Contraseña</label><input class="inp" id="cpw" value="${(c.password_plain||'').replace(/"/g,'&quot;')}"></div></div><div class="fg"><label>Notas</label><textarea class="inp" id="cn" rows="2">${(c.notes||'').replace(/</g,'&lt;')}</textarea></div><button class="btn bp" style="width:100%;justify-content:center;margin-top:8px" onclick="updateCred(${id})">Guardar Cambios</button>`)}

async function saveCred(){const shared=document.getElementById('cshared')?.value==='1';const b={app_name:document.getElementById('ca').value,app_url:document.getElementById('cu').value,username:document.getElementById('cuser').value,password_plain:document.getElementById('cpw').value,notes:document.getElementById('cn').value};if(shared)b.user_id=null;if(!b.app_name)return alert('Nombre obligatorio');try{await api('app_credentials',{method:'POST',body:b});document.querySelector('.mo')?.remove();loadCreds()}catch(e){alert(e.message)}}

async function updateCred(id){const b={app_name:document.getElementById('ca').value,app_url:document.getElementById('cu').value,username:document.getElementById('cuser').value,password_plain:document.getElementById('cpw').value,notes:document.getElementById('cn').value};if(!b.app_name)return alert('Nombre obligatorio');try{await api('app_credential_update',{method:'PUT',params:{id},body:b});document.querySelector('.mo')?.remove();loadCreds()}catch(e){alert(e.message)}}

setInterval(()=>{const el=document.getElementById('lc');if(el)el.textContent=new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'})},1000);

render();
